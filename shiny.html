<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>神图 · 无限闪耀 | 可拖动相册</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, -apple-system, sans-serif; }
        html { overflow: hidden; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            font-size: 16px;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at 20% 30%, #FFF7E8, #FFEFD6, #FFE4C4, #FFD9B5);
            background-size: 200% 200%;
            animation: softLaserShift 12s ease infinite alternate;
            overflow: hidden;
            position: relative;
        }
        @keyframes softLaserShift {
            0% { background-position: 0% 0%; background: radial-gradient(circle at 20% 30%, #FFF7E8, #FFEFD6, #FFE4C4, #FFD9B5); }
            100% { background-position: 100% 50%; background: radial-gradient(circle at 80% 70%, #FFFBF0, #FFEFDB, #FFE6CE, #FFDCB9); }
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255,200,150,0.12) 0px, rgba(255,200,150,0.12) 2px, transparent 2px, transparent 10px);
            pointer-events: none; z-index: 1;
        }

        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px;
            background: rgba(255,245,230,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #FFD9AE;
        }
        .back-home{
            background:#FF952D;
            border:1px solid #E67A00;
            color:white;
            padding:6px 16px;
            border-radius:40px;
            font-size:.7rem;
            font-weight:600;
            cursor:pointer;
            transition:all 0.25s;
            text-decoration:none;
            box-shadow:0 2px 8px rgba(255,149,45,0.3);
        }
        .back-home:hover{
            background:#E67A00;
            transform:translateY(-1px);
            box-shadow:0 4px 12px rgba(255,149,45,0.4);
        }
        .page-title {
            font-weight: 800;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #C95F1A, #E67E22);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        @media (max-width: 550px) {
            .page-title { font-size: 1rem; }
            .top-nav { padding: 10px 14px; }
            .back-home { padding: 6px 14px; font-size: 0.75rem; }
        }

        #hero {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            cursor: grab;
            position: relative;
        }
        #hero.dragging { cursor: grabbing; }
        #images {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .item {
            position: absolute;
            top: 0;
            left: 0;
            will-change: transform;
            cursor: pointer;
            transition: filter 0.2s;
        }
        .item:hover { filter: brightness(1.06); z-index: 10; }
        .item-wrapper { will-change: transform; }
        .item-image {
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            will-change: transform;
            pointer-events: none;
        }
        .item-caption {
            display: block;
            font-size: 0.7rem;
            line-height: 1.3;
            margin-top: 8px;
            padding: 0 4px;
            color: #8B4513;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s, transform 0.4s;
        }
        .item:hover .item-caption { opacity: 1; transform: translateY(0); }

        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
            cursor: pointer; visibility: hidden; opacity: 0; transition: 0.2s;
        }
        .lightbox.active { visibility: visible; opacity: 1; }
        .lightbox-img { max-width: 90vw; max-height: 90vh; border-radius: 32px; box-shadow: 0 0 40px #FFB86B; }
        .lb-close {
            position: absolute; top: 20px; right: 30px;
            font-size: 2.5rem; color: white; cursor: pointer;
            background: rgba(0,0,0,0.5); width: 50px; height: 50px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; transition: 0.2s;
        }
        .lb-close:hover { background: #FFB26B; transform: scale(1.1); }

        .hint {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #B45A2C; font-size: 0.75rem; font-weight: 600;
            background: rgba(255,245,230,0.8); backdrop-filter: blur(12px);
            padding: 6px 24px; border-radius: 60px; z-index: 50;
            pointer-events: none; white-space: nowrap;
        }
    </style>
</head>
<body>
<div class="top-nav">
    <a href="gallery.html" class="back-home"><i class="fas fa-home"></i> 返回主相册</a>
</div>
<div id="hero">
    <div id="images"></div>
</div>
<div class="hint">✨ 按住拖动 · 点击查看 ✨</div>
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="lb-close" onclick="closeLightbox()">&times;</span>
    <img id="lbImg" class="lightbox-img" style="display:none">
    
</div>

<script>
    // ======================= 神图数据 =======================
    const SIZES = [
        { w: 400, h: 400 }, { w: 540, h: 360 }, { w: 400, h: 500 }, { w: 260, h: 260 },
        { w: 360, h: 240 }, { w: 300, h: 400 }, { w: 400, h: 280 }, { w: 280, h: 420 },
        { w: 350, h: 350 }, { w: 500, h: 340 }, { w: 320, h: 450 }, { w: 240, h: 320 },
    ];
    // 从111张中随机打乱取60张
    const allIds = Array.from({ length: 111 }, (_, i) => i + 1);
    for (let i = allIds.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allIds[i], allIds[j]] = [allIds[j], allIds[i]];
    }
    const chosen = allIds.slice(0, 30);
    const DATA = chosen.map((id, i) => ({
        src: `https://domiii.oss-cn-hangzhou.aliyuncs.com/shiny/shiny${id}.jpg`,
        cap: `舞台闪耀 · 随机瞬间`,
        ...SIZES[i % SIZES.length],
    }));
    const FALLBACKS = DATA.map((d, i) =>
        `https://picsum.photos/id/${(i * 31 + 200) % 400}/${d.w}/${d.h}`
    );

    const $container = document.getElementById('images');
    const $hero = document.getElementById('hero');

    // ---- 状态 ----
    const state = {
        winW: window.innerWidth,
        winH: window.innerHeight,
        scroll: { x: 0, y: 0 },
        target: { x: 0, y: 0 },
        last: { x: 0, y: 0 },
        delta: { x: 0, y: 0 },
        mouse: { x: 0.5, y: 0.5 },
        isDragging: false,
        dragStartX: 0, dragStartY: 0,
        dragScrollX: 0, dragScrollY: 0,
        tileW: 0, tileH: 0,
    };

    const items = [];
    let animId = null;

    // ---- 构建网格 ----
    function buildGrid() {
        const w = state.winW;
        const h = state.winH;
        const ORIG_W = 1522;
        const ORIG_H = 1238;
        state.tileW = w;
        state.tileH = w * (ORIG_H / ORIG_W);

        $container.innerHTML = '';

        function seededRand(seed) {
            const x = Math.sin(seed * 9301 + 49297) * 49297;
            return x - Math.floor(x);
        }
        const baseItems = DATA.map((d, i) => {
            const sx = state.tileW / ORIG_W;
            const sy = state.tileH / ORIG_H;
            const margin = 20;
            const maxX = state.tileW - d.w * sx - margin * sx;
            const maxY = state.tileH - d.h * sy - margin * sy;
            return {
                idx: i,
                src: d.src,
                cap: d.cap,
                x: margin * sx + seededRand(i * 7 + 1) * maxX,
                y: margin * sy + seededRand(i * 13 + 3) * maxY,
                w: d.w * sx,
                h: d.h * sy,
            };
        });

        items.length = 0;
        const repsX = [0, state.tileW];
        const repsY = [0, state.tileH];

        baseItems.forEach(base => {
            repsX.forEach(offX => {
                repsY.forEach(offY => {
                    const el = document.createElement('div');
                    el.className = 'item';
                    el.style.width = base.w + 'px';

                    const wrapper = document.createElement('div');
                    wrapper.className = 'item-wrapper';

                    const imgWrap = document.createElement('div');
                    imgWrap.className = 'item-image';
                    imgWrap.style.width = base.w + 'px';
                    imgWrap.style.height = base.h + 'px';

                    const img = document.createElement('img');
                    img.src = base.src;
                    img.onerror = function() { this.src = FALLBACKS[base.idx]; this.onerror = null; };
                    img.loading = 'lazy';
                    imgWrap.appendChild(img);

                    wrapper.appendChild(imgWrap);

                    const cap = document.createElement('span');
                    cap.className = 'item-caption';
                    cap.textContent = base.cap;
                    wrapper.appendChild(cap);

                    el.appendChild(wrapper);
                    $container.appendChild(el);

                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openLightbox(base.src);
                    });

                    items.push({
                        el, imgWrap,
                        x: base.x + offX,
                        y: base.y + offY,
                        w: base.w, h: base.h,
                        extraX: 0, extraY: 0,
                        rect: el.getBoundingClientRect(),
                        ease: 0.3 + Math.random() * 0.3,
                        idx: base.idx,
                    });
                });
            });
        });

        state.tileW *= 2;
        state.tileH *= 2;
        state.scroll.x = state.target.x = state.last.x = -w * 0.1;
        state.scroll.y = state.target.y = state.last.y = -h * 0.1;
    }

    // ---- 事件绑定 ----
    function onResize() {
        state.winW = window.innerWidth;
        state.winH = window.innerHeight;
        buildGrid();
    }

    function onWheel(e) {
        e.preventDefault();
        const f = 0.4;
        state.target.x -= e.deltaX * f;
        state.target.y -= e.deltaY * f;
    }

    function onMouseDown(e) {
        if (e.button !== 0) return;
        state.isDragging = true;
        $hero.classList.add('dragging');
        state.dragStartX = e.clientX;
        state.dragStartY = e.clientY;
        state.dragScrollX = state.target.x;
        state.dragScrollY = state.target.y;
    }

    function onMouseMove(e) {
        state.mouse.x = e.clientX / state.winW;
        state.mouse.y = e.clientY / state.winH;
        if (state.isDragging) {
            state.target.x = state.dragScrollX + (e.clientX - state.dragStartX);
            state.target.y = state.dragScrollY + (e.clientY - state.dragStartY);
        }
    }

    function onMouseUp() {
        state.isDragging = false;
        $hero.classList.remove('dragging');
    }

    // ---- Touch support ----
    let touchId = null;
    function onTouchStart(e) {
        const t = e.changedTouches[0];
        touchId = t.identifier;
        state.isDragging = true;
        $hero.classList.add('dragging');
        state.dragStartX = t.clientX;
        state.dragStartY = t.clientY;
        state.dragScrollX = state.target.x;
        state.dragScrollY = state.target.y;
    }
    function onTouchMove(e) {
        for (const t of e.changedTouches) {
            if (t.identifier === touchId) {
                state.mouse.x = t.clientX / state.winW;
                state.mouse.y = t.clientY / state.winH;
                if (state.isDragging) {
                    state.target.x = state.dragScrollX + (t.clientX - state.dragStartX);
                    state.target.y = state.dragScrollY + (t.clientY - state.dragStartY);
                }
            }
        }
    }
    function onTouchEnd() {
        state.isDragging = false;
        touchId = null;
        $hero.classList.remove('dragging');
    }

    // ---- 渲染循环 ----
    function render() {
        const s = state;
        const easeScroll = 0.06;

        s.scroll.x += (s.target.x - s.scroll.x) * easeScroll;
        s.scroll.y += (s.target.y - s.scroll.y) * easeScroll;

        s.delta.x = s.scroll.x - s.last.x;
        s.delta.y = s.scroll.y - s.last.y;

        const dirX = s.scroll.x >= s.last.x ? 'right' : 'left';
        const dirY = s.scroll.y >= s.last.y ? 'down' : 'up';

        items.forEach(item => {
            const newX = 5 * s.delta.x * item.ease + (s.mouse.x - 0.5) * item.rect.width * 0.6;
            const newY = 5 * s.delta.y * item.ease + (s.mouse.y - 0.5) * item.rect.height * 0.6;

            const posX = item.x + s.scroll.x + item.extraX + newX;
            const posY = item.y + s.scroll.y + item.extraY + newY;

            if (dirX === 'right' && posX > s.winW) item.extraX -= s.tileW;
            if (dirX === 'left' && posX + item.rect.width < 0) item.extraX += s.tileW;
            if (dirY === 'down' && posY > s.winH) item.extraY -= s.tileH;
            if (dirY === 'up' && posY + item.rect.height < 0) item.extraY += s.tileH;

            const fx = item.x + s.scroll.x + item.extraX + newX;
            const fy = item.y + s.scroll.y + item.extraY + newY;

            item.el.style.transform = `translate(${fx}px, ${fy}px)`;

            const img = item.imgWrap.querySelector('img');
            if (img) {
                const mx = (s.mouse.x - 0.5) * item.ease * 10;
                const my = (s.mouse.y - 0.5) * item.ease * 10;
                img.style.transform = `scale(1.15) translate(${-mx}%, ${-my}%)`;
            }
        });

        s.last.x = s.scroll.x;
        s.last.y = s.scroll.y;

        animId = requestAnimationFrame(render);
    }

    // ---- 灯箱 ----
    function openLightbox(src) {
        const lb = document.getElementById('lightbox');
        document.getElementById('lbImg').src = src;
        document.getElementById('lbImg').style.display = '';
        lb.classList.add('active');
    }

    function closeLightbox() {
        const lb = document.getElementById('lightbox');
        lb.classList.remove('active');
        document.getElementById('lbImg').src = '';
    }

    // ---- 初始化 ----
    function init() {
        buildGrid();
        window.addEventListener('resize', onResize);
        window.addEventListener('wheel', onWheel, { passive: false });
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mouseup', onMouseUp);
        $hero.addEventListener('touchstart', onTouchStart, { passive: true });
        $hero.addEventListener('touchmove', onTouchMove, { passive: true });
        $hero.addEventListener('touchend', onTouchEnd);
        render();
    }
    init();
</script>
</body>
</html>
