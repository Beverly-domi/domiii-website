<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🍉 合成大西瓜 · 张奕然YR珍藏版 🍉</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #fff8f0, #ffefe4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', 'Noto Sans CJK SC', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        .game-wrapper {
            background: rgba(255, 248, 240, 0.55);
            backdrop-filter: blur(10px);
            border-radius: 80px;
            padding: 20px 24px 28px;
            box-shadow: 0 24px 32px rgba(180, 130, 80, 0.25), inset 0 1px 2px rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 200, 150, 0.35);
        }

        .game-container {
            background: #fffcf8;
            border-radius: 60px;
            box-shadow: 0 16px 28px rgba(180, 120, 60, 0.2), inset 0 1px 4px rgba(255,250,235,0.9);
            overflow: hidden;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px 8px 28px;
            background: linear-gradient(135deg, #fffaf2 0%, #fff5e8 100%);
            border-bottom: 2px solid #f5dcc0;
        }

        .score-card {
            background: #ff952d;
            border-radius: 48px;
            padding: 8px 24px;
            display: flex;
            align-items: baseline;
            gap: 12px;
            box-shadow: inset 0 -3px 0 #cc7000, 0 8px 18px rgba(255,149,45,0.3);
        }

        .score-label {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #fff5e0;
        }

        .score-number {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 2px 3px rgba(180, 80, 0, 0.3);
            line-height: 1;
        }

        .btn-reset {
            background: linear-gradient(145deg, #ff9f2c, #e67a00);
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px 26px;
            border-radius: 40px;
            color: #ffffff;
            cursor: pointer;
            box-shadow: 0 7px 0 #c07020;
            transition: 0.07s linear;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-reset:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #c07020;
        }

        .canvas-area {
            display: flex;
            justify-content: center;
            background: #faf0e6;
            padding: 20px 20px 0 20px;
        }

        canvas {
            background: #ffffff;
            border-radius: 48px;
            box-shadow: inset 0 0 0 5px #fff8ee, 0 18px 28px rgba(180, 130, 80, 0.2);
            cursor: grab;
            display: block;
            width: 100%;
            height: auto;
        }
        canvas:active {
            cursor: grabbing;
        }

        .footer-panel {
            background: #faf0e6;
            padding: 18px 28px 24px;
            border-radius: 0 0 56px 56px;
        }

        .next-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f5e8d8;
            padding: 8px 20px;
            border-radius: 100px;
            margin-bottom: 20px;
            box-shadow: inset 0 1px 4px rgba(200, 150, 100, 0.1), 0 6px 12px rgba(180, 130, 80, 0.1);
        }

        .next-label-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 700;
            color: #8a5e3c;
            font-size: 1.1rem;
        }

        .next-preview {
            background: #ffffff;
            border-radius: 60px;
            padding: 6px 18px 6px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.04), 0 5px 10px rgba(180,130,80,0.1);
        }

        .mini-canvas-box {
            width: 58px;
            height: 58px;
            background: #fff8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(180,130,80,0.15);
        }

        #nextFruitCanvas {
            width: 52px;
            height: 52px;
            border-radius: 50%;
        }
        .credit-note {
            font-size: 12px;
            text-align: center;
            margin-top: 16px;
            color: #a08060;
            font-weight: 500;
            background: #f5e8d8;
            padding: 6px 12px;
            border-radius: 50px;
            display: inline-block;
            width: 100%;
        }
        @media (max-width: 550px) {
            .game-wrapper { padding: 12px; }
            .score-number { font-size: 1.5rem; }
            .btn-reset { padding: 6px 18px; font-size: 1rem; }
            .footer-panel { padding: 14px 16px 20px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <div class="game-header">
            <div class="score-card">
                <span class="score-label">🍉 总分</span>
                <span class="score-number" id="scoreValue">0</span>
            </div>
            <button class="btn-reset" id="resetBtn">🔄 新的一局</button>
        </div>
        <div class="canvas-area">
            <canvas id="gameCanvas" width="500" height="700" style="width:100%; max-width:500px; aspect-ratio:500/700"></canvas>
        </div>
        <div class="footer-panel">
            <div class="next-section">
                <div class="next-label-wrap">
                    <span>🍬 下一个水果</span>
                    <span style="font-size: 1.2rem;">✨</span>
                </div>
                <div class="next-preview">
                    <div class="mini-canvas-box">
                        <canvas id="nextFruitCanvas" width="56" height="56"></canvas>
                    </div>
                </div>
            </div>
            <div class="credit-note">
                🎬 图片来源：@TF家族-张奕然YR 粉丝投稿 | 每个水果都是独一无二的珍藏影像 ✨
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ================= 全部25张图片，不分组，每次完全随机出现 =================
        const ALL_IMAGES = [
            "https://img.heliar.top/file/1781480599876_weibo3-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480603505_weibo5-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480604952_weibo6-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480605397_weibo4-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480613258_weibo8-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480614958_weibo13-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480615927_weibo7-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480619101_weibo10-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480620489_weibo9-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480624176_weibo18-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480625447_weibo12-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480625657_weibo17-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480626018_weibo15-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480629045_weibo14-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480632553_weibo16-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480632977_weibo20-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480635332_weibo19-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480665483_weibo23-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480668757_weibo26-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480670850_weibo25-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480677154_weibo28-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480677779_weibo29-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480677934_weibo31-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480679068_weibo27-compressed-compressed.jpeg",
            "https://img.heliar.top/file/1781480690519_weibo34-compressed-compressed.jpeg",
        ];

        // 预加载所有图片的缓存
        let imageCache = {};     // key: url, value: HTMLImageElement
        let pendingLoadCount = 0;
        
        // 从全部图片中随机选一张
        function getRandomImageUrl() {
            return ALL_IMAGES[Math.floor(Math.random() * ALL_IMAGES.length)] || null;
        }
        
        // 预加载全部图片
        function preloadAllImages() {
            ALL_IMAGES.forEach(url => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {};
                img.src = url;
                imageCache[url] = img;
            });
        }
        
        // 获取一张已缓存的图片对象（加载完成才返回）
        function getRandomCachedImage() {
            const url = getRandomImageUrl();
            if (url && imageCache[url] && imageCache[url].complete && imageCache[url].naturalWidth > 0) {
                return imageCache[url];
            }
            return null;
        }
        
        // 高级备用: 由于我们希望完全图片化，如果图片暂时没加载好，依然返回一个占位图像并持续尝试刷新
        // 但为了体验，每个水果在创建时绑定一个img对象，并在每帧绘制时如果图片未完成则会持续加载直到显示。
        
        // ---------- 游戏核心参数 ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextFruitCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        const W = 500, H = 700;
        const GROUND_Y = H - 42;
        const LEFT_WALL = 42;
        const RIGHT_WALL = W - 42;
        const RADIUS_MAP = {1:21, 2:25, 3:29, 4:33, 5:37, 6:41, 7:45, 8:49};
        
        let fruits = [];          // 存储水果对象，每个水果独立持有图片引用 { x, y, vx, vy, level, radius, mass, img }
        let nextLevel = 1;
        let score = 0;
        let gameOver = false;
        let animationId = null;
        let dragging = false;
        let dragX = W/2;
        let newFruitRadius = RADIUS_MAP[nextLevel];
        
        // 辅助随机水果等级
        function randLevel(){
            return Math.floor(Math.random() * 8) + 1;
        }
        
        // 核心：创建一个水果，随机从全部25张图片中选一张
        function createFruitWithImage(level, x, y, vx=0, vy=0){
            const radius = RADIUS_MAP[level];
            const randomUrl = getRandomImageUrl();
            let selectedImg = null;
            if(randomUrl){
                if(imageCache[randomUrl] && imageCache[randomUrl].complete){
                    selectedImg = imageCache[randomUrl];
                } else {
                    if(!imageCache[randomUrl]){
                        const newImg = new Image();
                        newImg.crossOrigin = "Anonymous";
                        newImg.src = randomUrl;
                        imageCache[randomUrl] = newImg;
                    }
                    selectedImg = imageCache[randomUrl];
                }
            }
            return {
                x, y, vx, vy,
                level, radius,
                mass: radius,
                img: selectedImg,
                imgUrl: randomUrl,
            };
        }
        
        // 绘制任意水果 (完全基于图片，如果图片无效则显示彩色文字"等级"备用)
        function drawFruitOnCanvas(context, cx, cy, fruit, targetSize=W){
            const radius = fruit.radius;
            let imgToDraw = fruit.img;
            // 如果当前fruit的img无效或者还没加载完，尝试重新从url获取图片
            if(!imgToDraw || !imgToDraw.complete || imgToDraw.naturalWidth === 0){
                if(fruit.imgUrl && imageCache[fruit.imgUrl] && imageCache[fruit.imgUrl].complete){
                    fruit.img = imageCache[fruit.imgUrl];
                    imgToDraw = fruit.img;
                } else if(fruit.imgUrl && !imageCache[fruit.imgUrl]){
                    const newImg = new Image();
                    newImg.crossOrigin = "Anonymous";
                    newImg.src = fruit.imgUrl;
                    imageCache[fruit.imgUrl] = newImg;
                    fruit.img = newImg;
                    imgToDraw = newImg;
                }
            }
            
            context.save();
            if(imgToDraw && imgToDraw.complete && imgToDraw.naturalWidth > 0){
                // 圆形裁剪绘制图片
                context.beginPath();
                context.arc(cx, cy, radius-1, 0, Math.PI*2);
                context.clip();
                context.drawImage(imgToDraw, cx-radius, cy-radius, radius*2, radius*2);
                context.restore();
                // 增加一点高光
                context.beginPath();
                context.arc(cx-3, cy-3, radius*0.15, 0, Math.PI*2);
                context.fillStyle = 'rgba(255,245,200,0.45)';
                context.fill();
            } else {
                // 图片加载失败或者尚未加载完成，优雅底色+等级文字 (保证视觉完整性)
                context.beginPath();
                context.arc(cx, cy, radius-1, 0, Math.PI*2);
                const grad = context.createRadialGradient(cx-5, cy-5, 3, cx, cy, radius);
                grad.addColorStop(0, '#e0ac77');
                grad.addColorStop(1, '#b97f44');
                context.fillStyle = grad;
                context.fill();
                context.font = `bold ${Math.floor(radius*0.8)}px "Segoe UI"`;
                context.fillStyle = '#2a2418';
                context.textAlign = 'center';
                context.textBaseline = 'middle';
                context.fillText(`LV${fruit.level}`, cx, cy+2);
            }
            // 描边精致感
            context.beginPath();
            context.arc(cx, cy, radius-0.5, 0, Math.PI*2);
            context.strokeStyle = '#fff8e0';
            context.lineWidth = 1.8;
            context.stroke();
        }
        
        // 绘制整个游戏场景
        function drawGame(){
            ctx.clearRect(0, 0, W, H);
            // 背景（淡橙白色调）
            ctx.fillStyle = '#fff8f0';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#f0d8b8';
            ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y+8);
            ctx.fillStyle = '#e0c4a0';
            for(let i=0;i<12;i++) ctx.fillRect(LEFT_WALL + i*35, GROUND_Y-3, 18, 6);
            ctx.fillStyle = '#e0c4a0';
            ctx.fillRect(LEFT_WALL-8, 0, 8, GROUND_Y);
            ctx.fillRect(RIGHT_WALL, 0, 8, GROUND_Y);
            ctx.fillStyle = '#e8c8a0';
            ctx.fillRect(LEFT_WALL-5, 0, 4, GROUND_Y);
            ctx.fillRect(RIGHT_WALL+4, 0, 4, GROUND_Y);
            
            // 绘制所有水果
            for(let f of fruits){
                drawFruitOnCanvas(ctx, f.x, f.y, f, W);
            }
            
            // 拖拽预览
            if(!gameOver && dragging){
                let clampedX = Math.min(RIGHT_WALL - newFruitRadius, Math.max(LEFT_WALL + newFruitRadius, dragX));
                ctx.globalAlpha = 0.85;
                // 创建临时预览水果
                let previewFruit = {
                    level: nextLevel,
                    radius: newFruitRadius,
                    img: getRandomCachedImage(),
                    imgUrl: getRandomImageUrl(),
                };
                drawFruitOnCanvas(ctx, clampedX, 52, previewFruit, W);
                ctx.globalAlpha = 1;
                ctx.beginPath();
                ctx.setLineDash([6, 8]);
                ctx.moveTo(clampedX, 40);
                ctx.lineTo(clampedX, 110);
                ctx.strokeStyle = '#ffb56e';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                ctx.setLineDash([]);
            }
            
            if(gameOver){
                ctx.font = '800 38px "Segoe UI"';
                ctx.fillStyle = '#442f1e';
                ctx.fillText('🍉 GAME OVER', W/2-130, H/2-50);
                ctx.font = '500 18px system-ui';
                ctx.fillStyle = '#b08060';
                ctx.fillText('点击「新的一局」继续畅玩', W/2-130, H/2+30);
            }
        }
        
        // 更新下一个水果预览
        function updateNextPreview(){
            newFruitRadius = RADIUS_MAP[nextLevel];
            nextCtx.clearRect(0, 0, 56, 56);
            let previewFruit = {
                level: nextLevel,
                radius: RADIUS_MAP[nextLevel],
                img: getRandomCachedImage(),
                imgUrl: getRandomImageUrl(),
            };
            drawFruitOnCanvas(nextCtx, 28, 28, previewFruit, 56);
        }
        
        // 物理与合并逻辑 (底部防抖动)
        function updatePhysics(){
            if(gameOver) return;
            const GRAVITY = 0.38, BOUNCE = 0.18, AIR_DRAG = 0.997, ITER = 4;
            for(let iter=0; iter<ITER; iter++){
                for(let i=0; i<fruits.length; i++){
                    let a = fruits[i];
                    a.vy += GRAVITY;
                    a.vx *= AIR_DRAG;
                    a.vy *= AIR_DRAG;
                    a.x += a.vx;
                    a.y += a.vy;
                    if(a.x - a.radius < LEFT_WALL){ a.x = LEFT_WALL + a.radius; a.vx = -a.vx * BOUNCE; }
                    if(a.x + a.radius > RIGHT_WALL){ a.x = RIGHT_WALL - a.radius; a.vx = -a.vx * BOUNCE; }
                    if(a.y + a.radius >= GROUND_Y){
                        a.y = GROUND_Y - a.radius;
                        if(Math.abs(a.vy) > 1.5) {
                            a.vy = -a.vy * BOUNCE;
                        } else {
                            a.vy = 0;
                            a.vx *= 0.85;
                        }
                    }
                    if(a.y - a.radius < 0){ a.y = a.radius; if(a.vy < 0) a.vy = -a.vy * 0.3; }
                }
                // 球间碰撞（地面附近只分离不互推）
                for(let i=0; i<fruits.length; i++){
                    for(let j=i+1; j<fruits.length; j++){
                        let f1 = fruits[i], f2 = fruits[j];
                        let dx = f1.x - f2.x, dy = f1.y - f2.y;
                        let dist = Math.hypot(dx, dy);
                        let minDist = f1.radius + f2.radius;
                        if(dist < minDist && dist > 0.01){
                            let overlap = minDist - dist;
                            let nx = dx/dist, ny = dy/dist;
                            let moveX = nx * overlap * 0.5;
                            let moveY = ny * overlap * 0.5;
                            f1.x -= moveX; f1.y -= moveY;
                            f2.x += moveX; f2.y += moveY;
                            // 双方都在地面附近 → 只分离，不弹开
                            if(f1.y + f1.radius > GROUND_Y - 5 && f2.y + f2.radius > GROUND_Y - 5) continue;
                            let vrelx = f1.vx - f2.vx, vrely = f1.vy - f2.vy;
                            let e = 0.3;
                            let imp = (1+e)*(vrelx*nx+vrely*ny) / ((1/f1.mass)+(1/f2.mass));
                            if(imp > 0 || imp < 0) { // always apply
                                f1.vx -= imp * nx / f1.mass;
                                f1.vy -= imp * ny / f1.mass;
                                f2.vx += imp * nx / f2.mass;
                                f2.vy += imp * ny / f2.mass;
                            }
                        }
                    }
                }
            }
        }
        
        // 合并相同等级 (合成更高级水果，全新图片)
        function mergeCheck(){
            let merged = false;
            for(let i=0; i<fruits.length; i++){
                for(let j=i+1; j<fruits.length; j++){
                    let a = fruits[i], b = fruits[j];
                    if(a && b && a.level === b.level && a.level < 8){
                        let dist = Math.hypot(a.x - b.x, a.y - b.y);
                        if(dist < a.radius + b.radius + 2){
                            let newLv = a.level + 1;
                            let newX = (a.x + b.x)/2;
                            let newY = (a.y + b.y)/2;
                            let newVx = (a.vx + b.vx)/2;
                            let newVy = (a.vy + b.vy)/2;
                            fruits.splice(j,1);
                            fruits.splice(i,1);
                            let newFruit = createFruitWithImage(newLv, newX, newY, newVx, newVy);
                            fruits.push(newFruit);
                            score += newLv * 12;
                            updateScoreUI();
                            merged = true;
                            break;
                        }
                    }
                }
                if(merged) break;
            }
            if(merged) mergeCheck();
        }
        
        function checkGameOver(){
            for(let f of fruits){
                if(f.y - f.radius < 55){
                    gameOver = true;
                    if(animationId) cancelAnimationFrame(animationId);
                    animationId = null;
                    drawGame();
                    return true;
                }
            }
            return false;
        }
        
        function updateScoreUI(){
            document.getElementById('scoreValue').innerText = Math.floor(score);
        }
        
        // 发射新水果 (完全基于图片)
        function releaseFruit(xPos){
            if(gameOver) return false;
            let releaseX = Math.min(RIGHT_WALL - newFruitRadius, Math.max(LEFT_WALL + newFruitRadius, xPos));
            let newF = createFruitWithImage(nextLevel, releaseX, 48, 0, 0.2);
            fruits.push(newF);
            generateNext();
            for(let i=0;i<4;i++) updatePhysics();
            mergeCheck();
            updatePhysics();
            if(checkGameOver()){ drawGame(); return false; }
            drawGame();
            return true;
        }
        
        function generateNext(){
            nextLevel = randLevel();
            updateNextPreview();
        }
        
        function resetGame(){
            gameOver = false;
            fruits = [];
            score = 0;
            updateScoreUI();
            nextLevel = randLevel();
            updateNextPreview();
            newFruitRadius = RADIUS_MAP[nextLevel];
            dragging = false;
            drawGame();
            if(animationId) cancelAnimationFrame(animationId);
            startLoop();
        }
        
        function physicsLoop(){
            if(!gameOver){
                updatePhysics();
                mergeCheck();
                checkGameOver();
                drawGame();
            } else { drawGame(); }
            animationId = requestAnimationFrame(physicsLoop);
        }
        
        function startLoop(){
            if(animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(physicsLoop);
        }
        
        // 事件绑定 (鼠标/触摸)
        function attachEvents(){
            const getCanvasCoord = (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let canvasX = (clientX - rect.left) * scaleX;
                return Math.min(W, Math.max(0, canvasX));
            };
            function startDrag(e){ e.preventDefault(); if(gameOver) return; dragging = true; dragX = getCanvasCoord(e); drawGame(); }
            function onDragMove(e){ if(!dragging || gameOver) return; e.preventDefault(); dragX = getCanvasCoord(e); drawGame(); }
            function endDrag(e){ if(!dragging || gameOver){ dragging = false; return; } e.preventDefault(); dragging = false; let finalX = getCanvasCoord(e); releaseFruit(finalX); drawGame(); }
            canvas.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', onDragMove);
            window.addEventListener('mouseup', endDrag);
            canvas.addEventListener('touchstart', startDrag);
            window.addEventListener('touchmove', onDragMove);
            window.addEventListener('touchend', endDrag);
            document.getElementById('resetBtn').addEventListener('click', ()=>resetGame());
        }
        
        // 初始化
        function init(){
            preloadAllImages();   // 后台预加载全部图片资源
            resetGame();
            attachEvents();
            startLoop();
        }
        init();
    })();
</script>
</body>
</html>
