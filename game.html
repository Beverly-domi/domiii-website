<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --p:#FF952D;--pl:#FFB866;--pd:#E67A00;
  --d:#3E2A1A;--s:#C27E4A;
  --pg:rgba(255,149,45,0.3);--pp:rgba(255,149,45,0.1);
  --cw:90px;--cg:8px;
  --sc:0 8px 24px rgba(0,0,0,0.07);
  --sh:0 16px 36px rgba(0,0,0,0.1);
  --rp:10px;
  --es:cubic-bezier(.22,.9,.4,1.1);
}
body{
  font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;
  min-height:100vh;overflow-x:hidden;
  background:linear-gradient(135deg,#f5ebe0 0%,#faf0e6 30%,#f5e6d3 60%,#f0e0cc 100%);
  background-attachment:fixed;
}
.nv{
  position:fixed;top:0;left:0;width:100%;
  background:rgba(255,248,240,.94);backdrop-filter:blur(24px);
  border-bottom:2px solid rgba(255,149,45,.25);
  padding:.6rem 1.5rem;z-index:100;
  display:flex;align-items:center;
  box-shadow:0 4px 12px rgba(0,0,0,.03);
}
.nv-b{
  background:var(--p);border:1px solid var(--pd);color:#fff;
  padding:.35rem 1rem;border-radius:40px;font-size:.7rem;
  font-weight:600;cursor:pointer;text-decoration:none;
  box-shadow:0 2px 8px rgba(255,149,45,.3);
  transition:all .25s;
}
.nv-b:hover{background:var(--pd);transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,149,45,.4);}
.hd{text-align:center;padding:4.2rem 1rem .2rem;position:relative;z-index:2}
.ht{font-size:clamp(1.3rem,4vw,2rem);font-weight:900;color:var(--d);letter-spacing:2px}
.ht span{color:var(--p)}
.hs{color:var(--s);font-size:.75rem;margin-top:.15rem;letter-spacing:1px}
.sb{
  display:flex;justify-content:center;gap:.5rem;
  padding:.4rem 1rem .4rem;position:relative;z-index:2;flex-wrap:wrap;
}
.si{
  display:flex;align-items:center;gap:.25rem;
  background:rgba(255,255,255,.7);backdrop-filter:blur(8px);
  border:1px solid var(--pp);border-radius:40px;
  padding:.2rem .7rem .2rem .5rem;font-size:.75rem;
  color:var(--d);font-weight:600;
}
.si .n{color:var(--pd);font-weight:800;min-width:1.2rem;text-align:center}
.si .nm{color:var(--s);min-width:auto}
.si.ik{cursor:pointer;transition:.2s}
.si.ik:hover{background:var(--pp);border-color:var(--pl)}
.db{
  display:flex;justify-content:center;gap:.4rem;
  padding:0 1rem .6rem;position:relative;z-index:2;
}
.dc{
  padding:.2rem .8rem;border-radius:30px;font-size:.7rem;
  font-weight:700;border:1.5px solid var(--pp);
  background:rgba(255,255,255,.5);color:var(--s);
  cursor:pointer;transition:.25s;letter-spacing:.5px;
}
.dc:hover{border-color:var(--pl);color:var(--pd)}
.dc.act{background:var(--p);border-color:var(--p);color:#fff;box-shadow:0 4px 12px var(--pg)}
.pm{
  position:relative;z-index:1;
  max-width:720px;margin:.4rem auto 0;
  padding:1.2rem .8rem;
  border-radius:40px;
  background:linear-gradient(160deg,#ffe4cc 0%,#ffeddb 30%,#fff5eb 60%,#ffffff 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.6),inset 0 -1px 0 rgba(200,140,80,.15),0 8px 32px rgba(180,120,60,.12);
  border:1px solid rgba(200,140,80,.15);
}
.pm::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  border-radius:40px;pointer-events:none;
  background-image:radial-gradient(circle at 25% 35%,rgba(200,140,80,.06) 1px,transparent 1px),radial-gradient(circle at 75% 65%,rgba(200,140,80,.06) 1px,transparent 1px);
  background-size:20px 20px;
}
.pm-c{
  position:absolute;width:36px;height:36px;pointer-events:none;
  opacity:.1;
}
.pm-c.tl{top:0;left:0;border-top:2px solid #b87840;border-left:2px solid #b87840;border-radius:40px 0 0 0}
.pm-c.tr{top:0;right:0;border-top:2px solid #b87840;border-right:2px solid #b87840;border-radius:0 40px 0 0}
.pm-c.bl{bottom:0;left:0;border-bottom:2px solid #b87840;border-left:2px solid #b87840;border-radius:0 0 0 40px}
.pm-c.br{bottom:0;right:0;border-bottom:2px solid #b87840;border-right:2px solid #b87840;border-radius:0 0 40px 0}
.bw{position:relative;z-index:2}
.bd{display:grid;justify-content:center;gap:var(--cg);perspective:1200px}
.cd{
  width:var(--cw);aspect-ratio:1/1;cursor:pointer;
  position:relative;transform-style:preserve-3d;
  transition:transform .4s var(--es);
  border-radius:var(--rp);
  opacity:0;transform:translateY(-12px) scale(.9);
}
.cd.in{opacity:1;transform:translateY(0) scale(1);transition:opacity .35s var(--es),transform .35s var(--es)}
.cd.fl{transform:rotateY(180deg)}
.cd.mt{transform:rotateY(180deg);pointer-events:none}
.face{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:var(--rp);backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}
.bk{
  background:linear-gradient(145deg,#fdf6ed 0%,#f8ecdc 40%,#f5e6d2 100%);
  border:1px solid var(--pp);box-shadow:var(--sc);z-index:2;
  transition:box-shadow .3s;
  display:flex;align-items:center;justify-content:center;
}
.bk-inner{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:1px;
  pointer-events:none;user-select:none;
}
.bk-emoji{
  font-size:clamp(1.2rem,3vw,1.8rem);
  filter:drop-shadow(0 2px 6px var(--pg));
  animation:bkPulse 3s ease-in-out infinite;
}
@keyframes bkPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.bk-text{
  font-family:'Noto Sans SC',sans-serif;
  font-size:.5rem;font-weight:700;color:var(--s);
  letter-spacing:2px;opacity:.7;
}
.cd:not(.fl):not(.mt):hover .bk{box-shadow:var(--sh)}
.cd:not(.fl):not(.mt):hover{transform:translateY(-3px)}
.cd:not(.fl):not(.mt):hover.fl{transform:rotateY(180deg) translateY(-3px)}
.bk-dots1{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;
  background-image:radial-gradient(circle,var(--p) .5px,transparent .5px);
  background-size:10px 10px;
  opacity:.10;
}
.bk-dots2{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;
  background-image:radial-gradient(circle,rgba(200,120,60,.5) .3px,transparent .3px);
  background-size:6px 6px;
  background-position:5px 5px;
  opacity:.15;
}
.bk-shine{
  position:absolute;top:-30%;left:-30%;width:160%;height:160%;
  background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.35) 0%,transparent 50%);
  pointer-events:none;opacity:.6;
}
.bk-ring{
  position:absolute;top:12%;left:12%;width:76%;height:76%;
  border-radius:50%;
  border:1.5px solid var(--pp);
  opacity:.2;pointer-events:none;
}
.bk-ring2{
  position:absolute;top:18%;left:18%;width:64%;height:64%;
  border-radius:50%;
  border:1px solid var(--pp);
  opacity:.12;pointer-events:none;
}
.bk-diamond{
  position:absolute;top:50%;left:50%;
  width:14%;height:14%;
  transform:translate(-50%,-50%) rotate(45deg);
  border:1.5px solid var(--pp);
  opacity:.15;pointer-events:none;
}
.ft{
  background:#fff;border:1px solid var(--pp);
  transform:rotateY(180deg);box-shadow:var(--sc);
  padding:1px;
}
.fw{width:100%;height:100%;border-radius:calc(var(--rp) - 2px);overflow:hidden;background:#FFF5EE}
.fw img{width:100%;height:100%;object-fit:cover;display:block}
.cd.mt .ft{
  border-color:var(--p);
  box-shadow:0 0 0 2px var(--pp),0 0 15px var(--pg),var(--sc);
  animation:mg .8s var(--es);
}
@keyframes mg{
  0%{box-shadow:0 0 0 0 var(--pg),0 0 0 var(--pg)}
  40%{box-shadow:0 0 0 4px var(--pg),0 0 20px var(--pg)}
  100%{box-shadow:0 0 0 2px var(--pp),0 0 15px var(--pg),var(--sc)}
}
.cd.sh{animation:sk .4s ease}
@keyframes sk{
  0%,100%{transform:rotateY(180deg) translateX(0)}
  20%{transform:rotateY(180deg) translateX(-5px)}
  40%{transform:rotateY(180deg) translateX(5px)}
  60%{transform:rotateY(180deg) translateX(-3px)}
  80%{transform:rotateY(180deg) translateX(3px)}
}
.mo{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.45);backdrop-filter:blur(16px);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  visibility:hidden;opacity:0;transition:.4s;
}
.mo.sv{visibility:visible;opacity:1}
.mc{
  background:linear-gradient(160deg,#fff,#FFF9F0,#FFF5E8);
  border:2px solid var(--pp);border-radius:48px;
  padding:2rem 1.8rem;max-width:320px;width:88%;text-align:center;
  box-shadow:0 40px 80px rgba(0,0,0,.2);
  transform:scale(.8) translateY(30px);
  transition:.5s var(--es);
}
.mo.sv .mc{transform:scale(1) translateY(0)}
.mi{font-size:2.5rem;margin-bottom:.2rem;animation:mb 1.2s ease-in-out infinite}
@keyframes mb{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.mt2{font-size:1.3rem;font-weight:900;color:var(--d);margin-bottom:.1rem}
.mt2 span{color:var(--p)}
.ms{color:var(--s);font-size:.7rem;margin-bottom:.6rem}
.mst{display:flex;justify-content:center;gap:1.5rem;margin:.6rem 0 1rem}
.msi{text-align:center}
.msi-n{font-size:1.4rem;font-weight:900;color:var(--pd)}
.msi-l{font-size:.55rem;color:var(--s);font-weight:600;letter-spacing:.5px}
.ma{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap}
.mb2{
  background:linear-gradient(135deg,var(--p),var(--pd));
  color:#fff;border:none;padding:.6rem 1.4rem;font-size:.8rem;
  font-weight:700;border-radius:60px;cursor:pointer;transition:.3s;
  box-shadow:0 6px 18px var(--pg);font-family:'Noto Sans SC',sans-serif;
}
.mb2:hover{transform:translateY(-2px);box-shadow:0 10px 28px var(--pg)}
.mb2.mo2{background:rgba(255,255,255,.85);color:var(--pd);border:2px solid var(--pl);box-shadow:none}
.mb2.mo2:hover{background:#fff;box-shadow:var(--sc)}
.cf{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1001;overflow:hidden}
.cp{position:absolute;top:-20px;opacity:.9;animation:cf2 linear forwards}
@keyframes cf2{
  0%{transform:translateY(0) rotate(0deg);opacity:.9}
  100%{transform:translateY(calc(100vh + 30px)) rotate(720deg);opacity:0}
}
.ts{
  position:fixed;top:68px;left:50%;
  transform:translateX(-50%) translateY(-18px);
  background:rgba(255,255,255,.95);backdrop-filter:blur(20px);
  border:1px solid var(--pp);
  padding:.45rem 1.2rem;border-radius:40px;
  color:var(--pd);font-size:.78rem;font-weight:700;
  z-index:100000;opacity:0;
  transition:.4s var(--es);pointer-events:none;
}
.ts.sv{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:620px){.pm{padding:.8rem .4rem;border-radius:28px;margin:.2rem auto 0}.pm{padding:.3rem;border-radius:24px} .bd{gap:3px}}
.nf{
  position:fixed;bottom:24px;right:24px;z-index:50;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--p),var(--pd));
  color:#fff;border:none;cursor:pointer;
  box-shadow:0 4px 16px var(--pg);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:all .3s ease;
  text-decoration:none;
}
.nf:hover{transform:scale(1.1) translateY(-2px);box-shadow:0 8px 24px var(--pg)}
.nf:active{transform:scale(.95)}
.nf .ft2{
  position:absolute;right:60px;background:rgba(62,42,26,.9);
  color:#fff;font-size:12px;font-weight:600;padding:4px 10px;
  border-radius:8px;white-space:nowrap;opacity:0;
  pointer-events:none;transition:opacity .3s ease;
}
.nf:hover .ft2{opacity:1}
@media(max-width:620px){.nf{width:44px;height:44px;font-size:16px;bottom:16px;right:16px}}
img{-webkit-user-drag:none;user-select:none;-webkit-touch-callout:none}

<script>
// ======================== 常量 & 图片库 ========================

// ======================== 硬币系统 (localStorage, 与原card.html互通) ========================
function loadCoinState() {
  try {
    const s = localStorage.getItem('idol_gacha_state');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return { coins:100, ownedCards:[], lastDaily:null, totalDraws:0, consecutiveNoSSR:0, hiddenStarBoost:false, totalCards:0, spDuplicateCount:0 };
}
function saveCoinState(st) {
  try { localStorage.setItem('idol_gacha_state', JSON.stringify(st)); } catch(e) {}
}
function addCoins(amt) {
  const st = loadCoinState();
  st.coins = (st.coins||100) + amt;
  saveCoinState(st);
  return st.coins;
}
function updateCoinDisplay() {
  const coinSpan = document.getElementById('gameCoinDisplay');
  if(coinSpan) coinSpan.textContent = loadCoinState().coins;
}

// ======================== 游戏核心逻辑 ========================
(function(){
  const bd=document.getElementById('bd'), mv=document.getElementById('mv');
  const mtSpan=document.getElementById('mt'), ttSpan=document.getElementById('tt');
  const tmSpan=document.getElementById('tm'), rsBtn=document.getElementById('rs');
  const moDiv=document.getElementById('mo'), fmSpan=document.getElementById('fm');
  const ftSpan=document.getElementById('ft'), rpBtn=document.getElementById('rp');
  const hmBtn=document.getElementById('hm'), tsDiv=document.getElementById('ts');
  const cfDiv=document.getElementById('cf'), dcBtns=document.querySelectorAll('.dc');
  const backFolderBtn = document.getElementById('backToFolderBtn');
  const gachaNavBtn = document.getElementById('gachaNavBtn');
  const goToGachaBtn = document.getElementById('goToGachaBtn');

  let toastTimer;
  function showToast(msg, dur=1800){
    tsDiv.textContent=msg; tsDiv.classList.add('sv');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>tsDiv.classList.remove('sv'),dur);
  }

  // ===== 🎵 趣味音效系统 =====
  let audioCtx=null;
  function getAudioCtx(){ if(!audioCtx) try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} return audioCtx; }
  function playTone(freq,dur,type,vol,delay){
    try{
      const ctx=getAudioCtx(); if(!ctx) return;
      const d=delay||0;
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.type=type||'sine'; osc.frequency.setValueAtTime(freq,ctx.currentTime+d);
      gain.gain.setValueAtTime(vol||0.07,ctx.currentTime+d);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d+dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime+d); osc.stop(ctx.currentTime+d+dur);
    }catch(e){}
  }
  function playNoise(dur,vol,delay){
    try{
      const ctx=getAudioCtx(); if(!ctx) return;
      const d=delay||0;
      const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*dur),ctx.sampleRate);
      const data=buf.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,1.5);
      const src=ctx.createBufferSource(); src.buffer=buf;
      const g=ctx.createGain();
      g.gain.setValueAtTime(vol||0.04,ctx.currentTime+d);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d+dur);
      src.connect(g); g.connect(ctx.destination); src.start(ctx.currentTime+d);
    }catch(e){}
  }

  // 翻牌音效 - 轻快的"咻"
  function flipSound(){ playNoise(0.04,0.04); playTone(700,0.04,'sine',0.025); }

  // 配对成功 - 欢快上行音
  function successSound(){
    playTone(660,0.08,'sine',0.06);
    setTimeout(()=>playTone(880,0.08,'sine',0.06),60);
    setTimeout(()=>playTone(1100,0.12,'sine',0.07),120);
    setTimeout(()=>playNoise(0.08,0.025),100);
  }

  // 配对失败 - 滑稽下行"呜哇"
  function failSound(){
    playTone(400,0.1,'sawtooth',0.035);
    setTimeout(()=>playTone(330,0.1,'sawtooth',0.03),80);
    setTimeout(()=>playTone(260,0.15,'sawtooth',0.025),160);
    setTimeout(()=>playNoise(0.06,0.02),80);
  }

  // 通关 - 完整小旋律
  function winJingle(){
    const notes=[523,659,784,880,1047];
    notes.forEach((f,i)=>setTimeout(()=>playTone(f,0.2,'sine',0.06),i*100));
    setTimeout(()=>playTone(1319,0.4,'sine',0.08),500);
    setTimeout(()=>playNoise(0.3,0.03),400);
  }

  // 开始新游戏
  function gameStartSound(){
    playTone(523,0.1,'triangle',0.05);
    setTimeout(()=>playTone(659,0.1,'triangle',0.04),80);
    setTimeout(()=>playTone(784,0.15,'triangle',0.04),160);
  }

  function shuffleArray(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

  let cardElements=[], flippedCards=[], matchedCount=0, totalPairs=0, moves=0, locked=false, timerInterval=null, seconds=0, gameStarted=false, gameDone=false, currentLevel='easy';

  function getLevelConfig(level){
    if(level==='easy') return { pairs:8, cols:4 };
    if(level==='medium') return { pairs:18, cols:6 };
    return { pairs:32, cols:8 };
  }
  function calcCardSize(cols){
    const pad=window.innerWidth<=620?6:24;
    const maxWidth=Math.min(window.innerWidth-pad,680);
    const gapVal=window.innerWidth<=620?3:8;
    const available=maxWidth - (cols-1)*gapVal;
    const minSize=window.innerWidth<=620?(cols<=6?42:36):46;
    return Math.max(minSize, Math.min(Math.floor(available/cols),120));
  }

  function generateDeck(){
    const cfg=getLevelConfig(currentLevel); totalPairs=cfg.pairs; ttSpan.textContent=totalPairs;
    const selected=shuffleArray([...PHOTOS]).slice(0,totalPairs);
    let deck=[];
    selected.forEach((src,idx)=>{ deck.push({id:idx,src}); deck.push({id:idx,src}); });
    // 轻度洗牌防相邻相同
    for(let i=0;i<deck.length-1;i++){
      if(deck[i].id===deck[i+1].id){
        for(let j=i+2;j<deck.length;j++){
          if(deck[j].id!==deck[i].id){ [deck[i+1],deck[j]]=[deck[j],deck[i+1]]; break; }
        }
      }
    }
    return shuffleArray(deck);
  }

  function formatTime(sec){ return String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0'); }
  function stopTimer(){ if(timerInterval){ clearInterval(timerInterval); timerInterval=null; } }
  function startTimer(){ if(timerInterval) return; timerInterval=setInterval(()=>{ seconds++; tmSpan.textContent=formatTime(seconds); },1000); }

  function renderBoard(){
    const deck=generateDeck();
    const cfg=getLevelConfig(currentLevel);
    const cols=cfg.cols, cardSize=calcCardSize(cols);
    document.documentElement.style.setProperty('--cw',cardSize+'px');
    const gapVal=window.innerWidth<=620?3:8;
    document.documentElement.style.setProperty('--cg',gapVal+'px');
    bd.style.gridTemplateColumns=`repeat(${cols},1fr)`;
    bd.innerHTML='';
    cardElements=[]; flippedCards=[]; matchedCount=0; moves=0; gameDone=false; gameStarted=false;
    mv.textContent='0'; mtSpan.textContent='0'; stopTimer(); seconds=0; tmSpan.textContent='00:00';
    moDiv.classList.remove('sv'); cfDiv.innerHTML='';
    deck.forEach((card,idx)=>{
      const cardDiv=document.createElement('div');
      cardDiv.className='cd'; cardDiv.dataset.id=card.id;
      const backDiv=document.createElement('div'); backDiv.className='face bk';
      backDiv.innerHTML='<div class="bk-dots1"></div><div class="bk-dots2"></div><div class="bk-shine"></div><div class="bk-ring"></div><div class="bk-ring2"></div><div class="bk-diamond"></div><div class="bk-inner"><div class="bk-emoji">🐷</div><div class="bk-text">✨ TA ✨</div></div>';
      const frontDiv=document.createElement('div'); frontDiv.className='face ft';
      frontDiv.innerHTML=`<div class="fw"><img draggable="false" src="${card.src}" alt="card" loading="lazy"></div>`;
      cardDiv.appendChild(backDiv); cardDiv.appendChild(frontDiv);
      cardDiv.addEventListener('click',()=>onCardClick(idx));
      bd.appendChild(cardDiv);
      cardElements.push(cardDiv);
      setTimeout(()=>cardDiv.classList.add('in'),25+idx*15);
    });
  }

  function onCardClick(idx){
    const el=cardElements[idx];
    if(locked || gameDone || el.classList.contains('fl') || el.classList.contains('mt') || flippedCards.length>=2) return;
    if(!gameStarted){ gameStarted=true; startTimer(); gameStartSound(); }
    flipSound();
    el.classList.add('fl'); flippedCards.push(el);
    if(flippedCards.length===2){
      moves++; mv.textContent=moves; locked=true;
      const cardA=flippedCards[0], cardB=flippedCards[1];
      if(cardA.dataset.id===cardB.dataset.id) matchSuccess(cardA,cardB);
      else matchFail(cardA,cardB);
    }
  }

  function matchSuccess(a,b){
    successSound();
    a.classList.add('mt'); b.classList.add('mt');
    matchedCount++; mtSpan.textContent=matchedCount;
    spawnSparkle(a); spawnSparkle(b);
    flippedCards=[];
    locked=false;
    if(matchedCount===totalPairs){
      gameDone=true; stopTimer(); winJingle();
      const reward = REWARDS[currentLevel]||0;
      const totalCoins = addCoins(reward);
      updateCoinDisplay();
      winStreak++;
      let bonus=0;
      if(winStreak>=3){ bonus=30; addCoins(30); updateCoinDisplay(); }
      const bonusMsg = bonus ? ` 连胜+${bonus}硬币` : '';
      setTimeout(()=>{
        fmSpan.textContent=moves;
        ftSpan.textContent=formatTime(seconds);
        document.getElementById('coinReward').textContent=`+${reward}${bonus?` (连胜+${bonus})`:''}`;
        moDiv.classList.add('sv');
        launchConfetti();
        showToast(`🎉 通关获得 ${reward} 硬币${bonusMsg}`, 2800);
      },500);
    }
  }

  function matchFail(a,b){
    failSound();
    shakeCard(a); shakeCard(b);
    a.classList.add('sh'); b.classList.add('sh');
    setTimeout(()=>{
      a.classList.remove('fl','sh'); b.classList.remove('fl','sh');
      flippedCards=[];
      locked=false;
    },1200);
  }

  function shakeCard(card){ card.classList.add('sh'); setTimeout(()=>card.classList.remove('sh'),800); }
  function spawnSparkle(card){
    const rect=card.getBoundingClientRect();
    const emojis=['✨','🌟','💫','⭐','⚡','💛'];
    const colors=['#FF952D','#FFB866','#FFD700','#E67A00'];
    for(let i=0;i<4;i++){
      const span=document.createElement('div');
      span.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      span.style.cssText=`position:fixed;pointer-events:none;z-index:999;font-size:${0.8+Math.random()*0.6}rem;left:${rect.left+Math.random()*rect.width}px;top:${rect.top+Math.random()*rect.height}px;animation:mf 0.7s ease-out forwards;color:${colors[Math.floor(Math.random()*colors.length)]}`;
      document.body.appendChild(span);
      setTimeout(()=>span.remove(),700);
    }
  }
  function launchConfetti(){
    const emojis=['🎉','✨','🎊','🐷','💖','💎'];
    for(let i=0;i<50;i++){
      const piece=document.createElement('div'); piece.className='cp';
      piece.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      piece.style.left=Math.random()*100+'%';
      piece.style.fontSize=(8+Math.random()*16)+'px';
      piece.style.animationDuration=(2.5+Math.random()*4)+'s';
      piece.style.animationDelay=Math.random()*1.5+'s';
      cfDiv.appendChild(piece);
      setTimeout(()=>{ if(piece.parentNode) piece.remove(); },7000);
    }
  }

  function restartGame(){ winStreak=0; locked=false; stopTimer(); seconds=0; gameStarted=false; gameDone=false; renderBoard(); window.scrollTo({top:0,behavior:'smooth'}); }
  function setLevel(level){ currentLevel=level; dcBtns.forEach(btn=>btn.classList.toggle('act',btn.dataset.lv===level)); restartGame(); }

  // 添加额外动画样式 (已经在全局有mf, xp但确保xp也可以)
  const extraStyle=document.createElement('style');
  extraStyle.textContent=`@keyframes mf{0%{transform:translateY(0) scale(.5);opacity:0}30%{transform:translateY(-15px) scale(1.2);opacity:1}100%{transform:translateY(-40px) scale(1);opacity:0}}@keyframes xp{0%{transform:scale(.3);opacity:0}40%{transform:scale(1.3);opacity:1}100%{transform:scale(1) translateY(-15px);opacity:0}}`;
  document.head.appendChild(extraStyle);

  // 按钮点击音效
  function clickSound(){ playTone(800,0.04,'sine',0.02); }

  // 绑定事件
  rsBtn.onclick=()=>{ clickSound(); winStreak=0; restartGame(); };
  rpBtn.onclick=()=>{ clickSound(); winStreak=0; restartGame(); };
  hmBtn.onclick=()=>{ clickSound(); if(backFolderBtn) backFolderBtn.click(); else window.location.href='#'; };
  backFolderBtn.onclick=(e)=>{ clickSound(); e.preventDefault(); window.location.href='wenjianjia.html'; };
  const toGacha = () => { window.location.href='card.html'; };
  gachaNavBtn.onclick=(e)=>{ clickSound(); e.preventDefault(); toGacha(); };
  goToGachaBtn.onclick=()=>{ clickSound(); toGacha(); };
  dcBtns.forEach(btn=>btn.onclick=()=>{ clickSound(); setLevel(btn.dataset.lv); });
  window.addEventListener('resize',()=>{ if(cardElements.length){ const cols=getLevelConfig(currentLevel).cols; const sz=calcCardSize(cols); document.documentElement.style.setProperty('--cw',sz+'px'); const gapVal=window.innerWidth<=620?'3':'8'; document.documentElement.style.setProperty('--cg',gapVal); } });
  document.addEventListener('keydown',e=>{ if((e.key==='r'||e.key==='R')&&!e.ctrlKey&&!e.metaKey)restartGame(); if(e.key==='1')setLevel('easy'); else if(e.key==='2')setLevel('medium'); else if(e.key==='3')setLevel('hard'); });

  updateCoinDisplay();
  renderBoard();
})();
</script>
