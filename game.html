<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>翻翻乐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --p:#FF952D;--pl:#FFB866;--pd:#E67A00;
  --d:#3E2A1A;--s:#C27E4A;
  --pg:rgba(255,149,45,0.3);--pp:rgba(255,149,45,0.1);
  --cw:90px;--cg:8px;
  --sc:0 8px 24px rgba(0,0,0,0.07);
  --sh:0 16px 36px rgba(0,0,0,0.1);
  --rp:10px;
  --es:cubic-bezier(.22,.9,.4,1.1);
}
body{
  font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;
  min-height:100vh;overflow-x:hidden;
  background:linear-gradient(135deg,#f5ebe0 0%,#faf0e6 30%,#f5e6d3 60%,#f0e0cc 100%);
  background-attachment:fixed;
}

/* nav */
.nv{
  position:fixed;top:0;left:0;width:100%;
  background:rgba(255,248,240,.94);backdrop-filter:blur(24px);
  border-bottom:2px solid rgba(255,149,45,.25);
  padding:.6rem 1.5rem;z-index:100;
  display:flex;align-items:center;
  box-shadow:0 4px 12px rgba(0,0,0,.03);
}
.nv-b{
  background:var(--p);border:1px solid var(--pd);color:#fff;
  padding:.35rem 1rem;border-radius:40px;font-size:.7rem;
  font-weight:600;cursor:pointer;text-decoration:none;
  box-shadow:0 2px 8px rgba(255,149,45,.3);
  transition:all .25s;
}
.nv-b:hover{background:var(--pd);transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,149,45,.4);}

/* header */
.hd{text-align:center;padding:4.2rem 1rem .2rem;position:relative;z-index:2}
.ht{font-size:clamp(1.3rem,4vw,2rem);font-weight:900;color:var(--d);letter-spacing:2px}
.ht span{color:var(--p)}
.hs{color:var(--s);font-size:.75rem;margin-top:.15rem;letter-spacing:1px}

/* stats */
.sb{
  display:flex;justify-content:center;gap:.5rem;
  padding:.4rem 1rem .4rem;position:relative;z-index:2;flex-wrap:wrap;
}
.si{
  display:flex;align-items:center;gap:.25rem;
  background:rgba(255,255,255,.7);backdrop-filter:blur(8px);
  border:1px solid var(--pp);border-radius:40px;
  padding:.2rem .7rem .2rem .5rem;font-size:.75rem;
  color:var(--d);font-weight:600;
}
.si .n{color:var(--pd);font-weight:800;min-width:1.2rem;text-align:center}
.si .nm{color:var(--s);min-width:auto}
.si.ik{cursor:pointer;transition:.2s}
.si.ik:hover{background:var(--pp);border-color:var(--pl)}

/* diff */
.db{
  display:flex;justify-content:center;gap:.4rem;
  padding:0 1rem .6rem;position:relative;z-index:2;
}
.dc{
  padding:.2rem .8rem;border-radius:30px;font-size:.7rem;
  font-weight:700;border:1.5px solid var(--pp);
  background:rgba(255,255,255,.5);color:var(--s);
  cursor:pointer;transition:.25s;letter-spacing:.5px;
}
.dc:hover{border-color:var(--pl);color:var(--pd)}
.dc.act{background:var(--p);border-color:var(--p);color:#fff;box-shadow:0 4px 12px var(--pg)}

/* ===== playmat - 翻翻乐专属背景（淡橙→白渐变，与主背景区分） ===== */
.pm{
  position:relative;z-index:1;
  max-width:720px;margin:.4rem auto 0;
  padding:1.2rem .8rem;
  border-radius:40px;
  background:linear-gradient(160deg,#ffe4cc 0%,#ffeddb 30%,#fff5eb 60%,#ffffff 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.6),inset 0 -1px 0 rgba(200,140,80,.15),0 8px 32px rgba(180,120,60,.12);
  border:1px solid rgba(200,140,80,.15);
}
.pm::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  border-radius:40px;pointer-events:none;
  background-image:radial-gradient(circle at 25% 35%,rgba(200,140,80,.06) 1px,transparent 1px),radial-gradient(circle at 75% 65%,rgba(200,140,80,.06) 1px,transparent 1px);
  background-size:20px 20px;
}
.pm-c{
  position:absolute;width:36px;height:36px;pointer-events:none;
  opacity:.1;
}
.pm-c.tl{top:0;left:0;border-top:2px solid #b87840;border-left:2px solid #b87840;border-radius:40px 0 0 0}
.pm-c.tr{top:0;right:0;border-top:2px solid #b87840;border-right:2px solid #b87840;border-radius:0 40px 0 0}
.pm-c.bl{bottom:0;left:0;border-bottom:2px solid #b87840;border-left:2px solid #b87840;border-radius:0 0 0 40px}
.pm-c.br{bottom:0;right:0;border-bottom:2px solid #b87840;border-right:2px solid #b87840;border-radius:0 0 40px 0}

/* board */
.bw{position:relative;z-index:2}
.bd{display:grid;justify-content:center;gap:var(--cg);perspective:1200px}

/* ===== CARD ===== */
.cd{
  width:var(--cw);aspect-ratio:1/1;cursor:pointer;
  position:relative;transform-style:preserve-3d;
  transition:transform .4s var(--es);
  border-radius:var(--rp);
  opacity:0;transform:translateY(-12px) scale(.9);
}
.cd.in{opacity:1;transform:translateY(0) scale(1);transition:opacity .35s var(--es),transform .35s var(--es)}
.cd.fl{transform:rotateY(180deg)}
.cd.mt{transform:rotateY(180deg);pointer-events:none}
.face{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:var(--rp);backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}

/* ===== CARD BACK - CSS图案 + 中心emoji文字 ===== */
.bk{
  background:linear-gradient(145deg,#fdf6ed 0%,#f8ecdc 40%,#f5e6d2 100%);
  border:2px solid var(--pp);box-shadow:var(--sc);z-index:2;
  transition:box-shadow .3s;
  display:flex;align-items:center;justify-content:center;
}
.bk-inner{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:1px;
  pointer-events:none;user-select:none;
}
.bk-emoji{
  font-size:clamp(1.2rem,3vw,1.8rem);
  filter:drop-shadow(0 2px 6px var(--pg));
  animation:bkPulse 3s ease-in-out infinite;
}
@keyframes bkPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.bk-text{
  font-family:'Noto Sans SC',sans-serif;
  font-size:.5rem;font-weight:700;color:var(--s);
  letter-spacing:2px;opacity:.7;
}
.cd:not(.fl):not(.mt):hover .bk{box-shadow:var(--sh)}
.cd:not(.fl):not(.mt):hover{transform:translateY(-3px)}
.cd:not(.fl):not(.mt):hover.fl{transform:rotateY(180deg) translateY(-3px)}

/* dot pattern layer 1 - 大点阵 */
.bk-dots1{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;
  background-image:radial-gradient(circle,var(--p) .5px,transparent .5px);
  background-size:10px 10px;
  opacity:.10;
}
/* dot pattern layer 2 - 小点阵偏移 */
.bk-dots2{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;
  background-image:radial-gradient(circle,rgba(200,120,60,.5) .3px,transparent .3px);
  background-size:6px 6px;
  background-position:5px 5px;
  opacity:.15;
}
/* 反光/光泽 */
.bk-shine{
  position:absolute;top:-30%;left:-30%;width:160%;height:160%;
  background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.35) 0%,transparent 50%);
  pointer-events:none;opacity:.6;
}
/* 装饰边框环 */
.bk-ring{
  position:absolute;top:12%;left:12%;width:76%;height:76%;
  border-radius:50%;
  border:1.5px solid var(--pp);
  opacity:.2;pointer-events:none;
}
.bk-ring2{
  position:absolute;top:18%;left:18%;width:64%;height:64%;
  border-radius:50%;
  border:1px solid var(--pp);
  opacity:.12;pointer-events:none;
}
/* 中心小菱形 */
.bk-diamond{
  position:absolute;top:50%;left:50%;
  width:14%;height:14%;
  transform:translate(-50%,-50%) rotate(45deg);
  border:1.5px solid var(--pp);
  opacity:.15;pointer-events:none;
}

/* ===== CARD FRONT - 纯照片 ===== */
.ft{
  background:#fff;border:2px solid var(--pp);
  transform:rotateY(180deg);box-shadow:var(--sc);
  padding:3px;
}
.fw{width:100%;height:100%;border-radius:calc(var(--rp) - 3px);overflow:hidden;background:#FFF5EE}
.fw img{width:100%;height:100%;object-fit:cover;display:block}
.cd.mt .ft{
  border-color:var(--p);
  box-shadow:0 0 0 3px var(--pp),0 0 20px var(--pg),var(--sc);
  animation:mg .8s var(--es);
}
@keyframes mg{
  0%{box-shadow:0 0 0 0 var(--pg),0 0 0 var(--pg)}
  40%{box-shadow:0 0 0 5px var(--pg),0 0 25px var(--pg)}
  100%{box-shadow:0 0 0 3px var(--pp),0 0 20px var(--pg),var(--sc)}
}
.cd.sh{animation:sk .4s ease}
@keyframes sk{
  0%,100%{transform:rotateY(180deg) translateX(0)}
  20%{transform:rotateY(180deg) translateX(-5px)}
  40%{transform:rotateY(180deg) translateX(5px)}
  60%{transform:rotateY(180deg) translateX(-3px)}
  80%{transform:rotateY(180deg) translateX(3px)}
}

/* modal */
.mo{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.45);backdrop-filter:blur(16px);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  visibility:hidden;opacity:0;transition:.4s;
}
.mo.sv{visibility:visible;opacity:1}
.mc{
  background:linear-gradient(160deg,#fff,#FFF9F0,#FFF5E8);
  border:2px solid var(--pp);border-radius:48px;
  padding:2rem 1.8rem;max-width:320px;width:88%;text-align:center;
  box-shadow:0 40px 80px rgba(0,0,0,.2);
  transform:scale(.8) translateY(30px);
  transition:.5s var(--es);
}
.mo.sv .mc{transform:scale(1) translateY(0)}
.mi{font-size:2.5rem;margin-bottom:.2rem;animation:mb 1.2s ease-in-out infinite}
@keyframes mb{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.mt2{font-size:1.3rem;font-weight:900;color:var(--d);margin-bottom:.1rem}
.mt2 span{color:var(--p)}
.ms{color:var(--s);font-size:.7rem;margin-bottom:.6rem}
.mst{display:flex;justify-content:center;gap:1.5rem;margin:.6rem 0 1rem}
.msi{text-align:center}
.msi-n{font-size:1.4rem;font-weight:900;color:var(--pd)}
.msi-l{font-size:.55rem;color:var(--s);font-weight:600;letter-spacing:.5px}
.ma{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap}
.mb2{
  background:linear-gradient(135deg,var(--p),var(--pd));
  color:#fff;border:none;padding:.6rem 1.4rem;font-size:.8rem;
  font-weight:700;border-radius:60px;cursor:pointer;transition:.3s;
  box-shadow:0 6px 18px var(--pg);font-family:'Noto Sans SC',sans-serif;
}
.mb2:hover{transform:translateY(-2px);box-shadow:0 10px 28px var(--pg)}
.mb2.mo2{background:rgba(255,255,255,.85);color:var(--pd);border:2px solid var(--pl);box-shadow:none}
.mb2.mo2:hover{background:#fff;box-shadow:var(--sc)}

/* confetti */
.cf{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1001;overflow:hidden}
.cp{position:absolute;top:-20px;opacity:.9;animation:cf2 linear forwards}
@keyframes cf2{
  0%{transform:translateY(0) rotate(0deg);opacity:.9}
  100%{transform:translateY(calc(100vh + 30px)) rotate(720deg);opacity:0}
}

/* toast */
.ts{
  position:fixed;top:68px;left:50%;
  transform:translateX(-50%) translateY(-18px);
  background:rgba(255,255,255,.95);backdrop-filter:blur(20px);
  border:1px solid var(--pp);
  padding:.45rem 1.2rem;border-radius:40px;
  color:var(--pd);font-size:.78rem;font-weight:700;
  z-index:100000;opacity:0;
  transition:.4s var(--es);pointer-events:none;
}
.ts.sv{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:620px){.pm{padding:.8rem .4rem;border-radius:28px;margin:.2rem auto 0}}
/* ===== Cross-page Navigation FAB ===== */
.nf{
  position:fixed;bottom:24px;right:24px;z-index:50;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--p),var(--pd));
  color:#fff;border:none;cursor:pointer;
  box-shadow:0 4px 16px var(--pg);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:all .3s ease;
  text-decoration:none;
}
.nf:hover{transform:scale(1.1) translateY(-2px);box-shadow:0 8px 24px var(--pg)}
.nf:active{transform:scale(.95)}
.nf .ft2{
  position:absolute;right:60px;background:rgba(62,42,26,.9);
  color:#fff;font-size:12px;font-weight:600;padding:4px 10px;
  border-radius:8px;white-space:nowrap;opacity:0;
  pointer-events:none;transition:opacity .3s ease;
}
.nf:hover .ft2{opacity:1}
@media(max-width:620px){.nf{width:44px;height:44px;font-size:16px;bottom:16px;right:16px}}
</style>
</head>
<body>

<div class="ts" id="ts"></div>

<nav class="nv">
  <a href="wenjianjia.html" class="nv-b" style="margin-right:auto">🏠 返回主页</a>
</nav>

<a class="nf" href="card.html" title="去抽卡">
  💎
  <span class="ft2">💎 多米抽抽乐</span>
</a>

<header class="hd">
  <div class="ht">✦ 记忆中的 <span>TA</span> ✦</div>
  <div class="hs">找到相同的照片，拼凑回忆碎片</div>
</header>

<div class="sb">
  <div class="si">翻牌 <span class="n" id="mv">0</span></div>
  <div class="si">配对 <span class="n" id="mt">0</span><span class="n nm">/ <span id="tt">8</span></span></div>
  <div class="si"><span id="tm">00:00</span></div>
  <div class="si" style="color:var(--pd);font-weight:800">🪙 <span id="gameCoinDisplay">100</span></div>
  <div class="si ik" id="rs">↻ 重开</div>
</div>

<div class="db">
  <span class="dc act" data-lv="easy">🍃 简单 4×4</span>
  <span class="dc" data-lv="medium">🌸 中等 6×6</span>
  <span class="dc" data-lv="hard">🔥 困难 8×8</span>
</div>

<!-- playmat - 与主背景区分 -->
<div class="pm">
  <div class="pm-c tl"></div>
  <div class="pm-c tr"></div>
  <div class="pm-c bl"></div>
  <div class="pm-c br"></div>
  <div class="bw">
    <div class="bd" id="bd"></div>
  </div>
</div>

<div class="mo" id="mo">
  <div class="mc">
    <div class="mi">🎉</div>
    <div class="mt2">全部通关 <span>✨</span></div>
    <div class="ms">所有照片已集齐</div>
    <div class="mst">
      <div class="msi"><div class="msi-n" id="fm">0</div><div class="msi-l">翻牌次数</div></div>
      <div class="msi"><div class="msi-n" id="ft">00:00</div><div class="msi-l">用时</div></div>
      <div class="msi"><div class="msi-n" id="coinReward" style="color:var(--pd)">+0</div><div class="msi-l">获得🪙</div></div>
    </div>
    <div class="ma">
      <button class="mb2" id="rp">↻ 再来一局</button>
      <button class="mb2" onclick="window.location.href='card.html'" style="background:linear-gradient(135deg,#ab47bc,#7b1fa2);box-shadow:0 6px 18px rgba(171,71,188,.25)">🎴 抽一抽</button>
      <button class="mb2 mo2" id="hm">🏠 回主页</button>
    </div>
  </div>
</div>

<div class="cf" id="cf"></div>

<script>
// ================================================================
const PHOTOS = Array.from({length:66}, (_,i) => 'https://domiii.oss-cn-hangzhou.aliyuncs.com/game/game'+(i+1)+'.jpg');
// ================================================================
// Shared coin system (same localStorage key as card.html)
const REWARDS = { easy:100, medium:200, hard:400 };
let winStreak = 0, streakBonus = 0;

function loadCoinState() {
  try {
    const s = localStorage.getItem('idol_gacha_state');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return { coins:100, ownedCards:[], lastDaily:null, totalDraws:0, consecutiveNoSSR:0, hiddenStarBoost:false, totalCards:0, spDuplicateCount:0 };
}
function saveCoinState(st) {
  try { localStorage.setItem('idol_gacha_state', JSON.stringify(st)); } catch(e) {}
}
function addCoins(amt) {
  const st = loadCoinState();
  st.coins = (st.coins||100) + amt;
  saveCoinState(st);
  return st.coins;
}
// ================================================================

(function(){
  const bd=document.getElementById('bd'), mv=document.getElementById('mv');
  const mt=document.getElementById('mt'), tt=document.getElementById('tt');
  const tm=document.getElementById('tm'), rs=document.getElementById('rs');
  const mo=document.getElementById('mo'), fm=document.getElementById('fm');
  const ft=document.getElementById('ft'), rp=document.getElementById('rp');
  const hm=document.getElementById('hm'), ts=document.getElementById('ts');
  const cf=document.getElementById('cf'), dcs=document.querySelectorAll('.dc');

  let _to;function to(m,d){ts.textContent=m;ts.classList.add('sv');clearTimeout(_to);_to=setTimeout(()=>ts.classList.remove('sv'),d||1800)}

  let ac;function gc(){if(!ac)try{ac=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}return ac}
  function tn(f,d,t,v){try{const c=gc();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start(c.currentTime);o.stop(c.currentTime+d)}catch(e){}}
  function s1(){tn(880,.14,'sine',.07);setTimeout(()=>tn(1100,.16,'sine',.05),80)}
  function s2(){tn(300,.16,'triangle',.05);setTimeout(()=>tn(240,.18,'triangle',.04),80)}
  function s3(){[0,100,200,300].forEach((d,i)=>setTimeout(()=>tn(660+i*110,.18,'sine',.05),d))}

  function sh(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

  let cards=[],flipped=[],mp=0,tp=0,moves=0,locked=false,ti=null,sec=0,started=false,done=false,lv='easy';

  function gc2(l){
    switch(l){
      case'easy':return{p:8,c:4};
      case'medium':return{p:18,c:6};
      case'hard':return{p:32,c:8};
      default:return{p:8,c:4}
    }
  }
  function calcS(c){
    const g=(c-1)*8,mw=Math.min(window.innerWidth-32,680),av=mw-g;
    return Math.max(46,Math.min(Math.floor(av/c),120));
  }

  function bd2(){
    const cfg=gc2(lv);tp=cfg.p;tt.textContent=tp;
    const sel=sh([...PHOTOS]).slice(0,tp);
    // 将每对的两个副本拆分到前后两区，各自打乱，大幅减少相邻匹配
    const pairs = sel.map((src,i) => ({id:i, src}));
    const p2 = sh([...pairs]);
    const half = tp;
    const a = [], b = [];
    p2.forEach(p => { a.push({id:p.id, src:p.src}); b.push({id:p.id, src:p.src}) });
    return [...sh(a), ...sh(b)];
  }

  function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
  function tStart(){if(ti)return;ti=setInterval(()=>{sec++;tm.textContent=fmt(sec)},1000)}
  function tStop(){if(ti){clearInterval(ti);ti=null}}

  function render(){
    const dk=bd2();bd.innerHTML='';
    cards=[];flipped=[];mp=0;moves=0;locked=false;done=false;started=false;
    mv.textContent='0';mt.textContent='0';tStop();sec=0;tm.textContent='00:00';
    mo.classList.remove('sv');cf.innerHTML='';
    const cfg=gc2(lv),cols=cfg.c,sz=calcS(cols);
    document.documentElement.style.setProperty('--cw',sz+'px');
    bd.style.gridTemplateColumns='repeat('+cols+',1fr)';
    dk.forEach((d,i)=>{
      const el=document.createElement('div');
      el.className='cd';el.dataset.id=d.id;
      // 卡背 - CSS图案 + 中心emoji文字
      const bk=document.createElement('div');bk.className='face bk';
      bk.innerHTML='<div class="bk-dots1"></div><div class="bk-dots2"></div><div class="bk-shine"></div><div class="bk-ring"></div><div class="bk-ring2"></div><div class="bk-diamond"></div><div class="bk-inner"><div class="bk-emoji">🐷</div><div class="bk-text">✦ TA ✦</div></div>';
      // 卡面 - 纯照片
      const ft=document.createElement('div');ft.className='face ft';
      ft.innerHTML='<div class="fw"><img src="'+d.src+'" alt="" loading="lazy"></div>';
      el.appendChild(bk);el.appendChild(ft);
      el.addEventListener('click',()=>onClick(i));
      bd.appendChild(el);cards.push(el);
      setTimeout(()=>el.classList.add('in'),25+i*20);
    });
  }

  function onClick(i){
    const el=cards[i];
    if(locked||done||el.classList.contains('fl')||el.classList.contains('mt')||flipped.length>=2)return;
    if(!started){started=true;tStart()}
    el.classList.add('fl');flipped.push(el);
    if(flipped.length===2){
      moves++;mv.textContent=moves;locked=true;
      const a=flipped[0],b=flipped[1];
      if(a.dataset.id===b.dataset.id)mtch(a,b);else nmtch(a,b);
    }
  }

  function mtch(a,b){
    s1();a.classList.add('mt');b.classList.add('mt');
    mp++;mt.textContent=mp;flipped=[];locked=false;
    sp(a);sp(b);
    if(mp===tp){
    done=true;tStop();s3();
    const reward = REWARDS[lv]||0;
    const total = addCoins(reward);
    winStreak++;
    let bonus = 0;
    if (winStreak >= 3) { bonus = 30; addCoins(30); }
    const bonusMsg = bonus ? ` 🔥 连胜奖励+${bonus}🪙` : '';
    setTimeout(()=>{
      fm.textContent=moves;ft.textContent=fmt(sec);
      document.getElementById('coinReward').textContent='+'+reward+(bonus?' (含连胜'+bonus+')':'');
      mo.classList.add('sv');lnch();
      to('🎉 获得 '+reward+' 🪙'+bonusMsg, 3000);
    },500);
  }
  }

  function sp(c){
    const r=c.getBoundingClientRect();
    const es=['✨','🌟','💫'];const cl=['#FF952D','#FFB866','#E67A00','#FFD700'];
    for(let j=0;j<3;j++){
      const p=document.createElement('div');
      p.style.cssText='position:fixed;pointer-events:none;z-index:999;font-size:'+(.6+Math.random()*.4)+'rem;left:'+(r.left+Math.random()*r.width)+'px;top:'+(r.top+Math.random()*r.height)+'px;animation:mf .7s ease-out forwards;color:'+cl[Math.floor(Math.random()*cl.length)];
      p.textContent=es[Math.floor(Math.random()*es.length)];
      document.body.appendChild(p);setTimeout(()=>p.remove(),700);
    }
  }

  function nmtch(a,b){
    s2();xx(a);xx(b);
    a.classList.add('sh');b.classList.add('sh');
    setTimeout(()=>{a.classList.remove('fl','sh');b.classList.remove('fl','sh');flipped=[];locked=false},550);
  }

  function xx(c){
    const r=c.getBoundingClientRect();
    const x=document.createElement('div');
    x.style.cssText='position:fixed;pointer-events:none;z-index:999;font-size:1.2rem;left:'+(r.left+r.width/2-10)+'px;top:'+(r.top+r.height/2-10)+'px;animation:xp .4s ease forwards;color:#FF6B6B';
    x.textContent='✕';
    document.body.appendChild(x);setTimeout(()=>x.remove(),400);
  }

  function lnch(){
    const es=['🧡','✨','🌟','🍊','💫','🐷','🎉','🥳'];
    for(let i=0;i<40;i++){
      const el=document.createElement('div');el.className='cp';
      el.textContent=es[Math.floor(Math.random()*es.length)];
      el.style.left=Math.random()*100+'%';
      el.style.fontSize=(8+Math.random()*14)+'px';
      el.style.animationDuration=(3+Math.random()*4)+'s';
      el.style.animationDelay=Math.random()*2+'s';
      cf.appendChild(el);
      setTimeout(()=>{if(el.parentNode)el.remove()},8000);
    }
  }

  function restart(){locked=false;tStop();sec=0;started=false;done=false;render();window.scrollTo({top:0,behavior:'smooth'})}
  function setLv(l){lv=l;dcs.forEach(c=>c.classList.toggle('act',c.dataset.lv===l));restart()}

  const st=document.createElement('style');
  st.textContent='@keyframes mf{0%{transform:translateY(0) scale(.5);opacity:0}30%{transform:translateY(-15px) scale(1.2);opacity:1}100%{transform:translateY(-40px) scale(1);opacity:0}}@keyframes xp{0%{transform:scale(.3);opacity:0}40%{transform:scale(1.3);opacity:1}100%{transform:scale(1) translateY(-15px);opacity:0}}';
  document.head.appendChild(st);

  rs.onclick=()=>{winStreak=0;restart();};rp.onclick=()=>{winStreak=0;restart();};
  hm.onclick=()=>{window.location.href='wenjianjia.html'};
  dcs.forEach(c=>c.onclick=()=>setLv(c.dataset.lv));
  window.addEventListener('resize',()=>{const c=gc2(lv).cols;document.documentElement.style.setProperty('--cw',calcS(c)+'px')});
  document.addEventListener('keydown',e=>{if((e.key==='r'||e.key==='R')&&!e.ctrlKey&&!e.metaKey)restart();if(e.key==='1')setLv('easy');else if(e.key==='2')setLv('medium');else if(e.key==='3')setLv('hard')});

  // Init coin display
  document.getElementById('gameCoinDisplay').textContent = loadCoinState().coins || 100;
  render();
})();
</script>
</body>
</html>
