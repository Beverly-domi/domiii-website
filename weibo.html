        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            font-size: 16px;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #FFF7E8, #FFEFD6, #FFE4C4, #FFD9B5);
            background-size: 200% 200%;
            animation: softLaserShift 12s ease infinite alternate;
            overflow-x: hidden;
            position: relative;
        }
        @keyframes softLaserShift {
            0% { background-position: 0% 0%; background: radial-gradient(circle at 20% 30%, #FFF7E8, #FFEFD6, #FFE4C4, #FFD9B5); }
            100% { background-position: 100% 50%; background: radial-gradient(circle at 80% 70%, #FFFBF0, #FFEFDB, #FFE6CE, #FFDCB9); }
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255,200,150,0.12) 0px, rgba(255,200,150,0.12) 2px, transparent 2px, transparent 10px);
            pointer-events: none; z-index: 1;
        }

        /* 顶部导航栏 */
        .top-nav {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center;

            background: rgba(255,245,230,0.85);

            border-bottom: 1px solid #FFD9AE;
        }
        .back-home{
            background:#FF952D;
            border:1px solid #E67A00;
            color:white;
            padding:6px 16px;
            border-radius:40px;
            font-size:.7rem;
            font-weight:600;
            cursor:pointer;
            transition:all 0.25s;
            text-decoration:none;
            box-shadow:0 2px 8px rgba(255,149,45,0.3);
        }
        .back-home:hover{
            background:#E67A00;
            transform:translateY(-1px);
            box-shadow:0 4px 12px rgba(255,149,45,0.4);
        }
        @media (max-width: 550px) {
            .top-nav {
                justify-content: space-between;
            }
        }

        /* 左右布局：左侧筛选栏 + 右侧内容 */
        .main-layout {
            display: flex;
            max-width: 1400px;
            margin: 1.5rem auto;
            padding: 0 1.2rem;
            gap: 1.5rem;
        }

            width: 240px;
            flex-shrink: 0;
            background: rgba(255, 248, 240, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 1.2rem 0.8rem;
            height: fit-content;
            position: sticky;
            top: 80px;
            border: 1px solid #FFE0B5;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .filter-section {
            margin-bottom: 1.5rem;
        }
        .filter-year-title {
            font-weight: 800;
            font-size: 1rem;
            color: #C25D1A;
            padding: 0.5rem 0.8rem;
            background: rgba(255,210,150,0.3);
            border-radius: 20px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;
        }
        .filter-year-title:hover {
            background: rgba(255,210,150,0.5);
        }
        .filter-year-title i {
            font-size: 0.8rem;
            transition: transform 0.2s;
        }
        .filter-year-title.collapsed i {
            transform: rotate(-90deg);
        }
        .month-list {
            padding-left: 0.8rem;
            margin-bottom: 0.8rem;
            display: block;
        }
        .month-list.collapsed {
            display: none;
        }
        .month-chip {
            display: inline-block;
            background: rgba(255,245,235,0.7);
            border: 1px solid rgba(255,149,45,0.25);
            padding: 0.3rem 0.9rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #B45F2B;
            cursor: pointer;
            transition: 0.15s;
            margin: 0.2rem 0.3rem;
        }
        .month-chip.active {
            background: #FF952D;
            color: white;
            border-color: transparent;
        }
        .month-chip:hover:not(.active) {
            background: rgba(255,149,45,0.2);
        }
        .filter-reset {
            text-align: center;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid #FFD9AE;
        }
        .reset-btn {
            background: rgba(255,180,100,0.6);
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #6B2E00;
            cursor: pointer;
            transition: 0.15s;
        }
        .reset-btn:active {
            transform: scale(0.95);
        }

        /* 右侧内容区 */
        .weibo-container {
            flex: 1;
            min-width: 0;
        }
        /* 微博卡片列表 */
        .weibo-cards-list {
            display: flex; flex-direction: column; gap: 1.5rem;
        }
        .weibo-card {
            background: rgba(255, 250, 240, 0.96);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
            transition: transform 0.25s, box-shadow 0.2s;
            cursor: pointer;
            backdrop-filter: blur(2px);
            border: 1px solid #FFE0B5;
        }
        .weibo-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.15);
        }
        .weibo-card-content {
            padding: 1.2rem 1.2rem 0.8rem 1.2rem;
        }
        .weibo-card-time {
            font-size: 0.8rem; color: #E67E22; font-weight: 700;
            margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.4rem;
        }
        .weibo-card-text {
            font-size: 0.85rem; color: #5C3E28; line-height: 1.45;
            margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
        .weibo-card-thumbnails {
            display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px;
            scrollbar-width: thin;
        }
        .weibo-card-thumbnails::-webkit-scrollbar { height: 4px; background: #FFE0B2; border-radius: 10px; }
        .weibo-card-thumbnails::-webkit-scrollbar-thumb { background: #E67E22; border-radius: 10px; }
        .thumb-item {
            flex-shrink: 0; width: 80px; height: 80px; border-radius: 18px;
            overflow: hidden; background: #FFF0E0; position: relative;
            transition: 0.15s; cursor: pointer;

        .thumb-item:hover { transform: scale(1.03); }
        .thumb-item img, .thumb-item video { width: 100%; height: 100%; object-fit: cover; }

            position: absolute; bottom: 4px; right: 4px;
            background: rgba(0,0,0,0.6); border-radius: 20px; padding: 2px 5px;
            font-size: 0.5rem; color: white; backdrop-filter: blur(2px);
        }
        .weibo-card-footer {
            padding: 0.7rem 1.2rem 1rem 1.2rem;
            border-top: 1px solid rgba(255,149,45,0.15);
            display: flex; justify-content: flex-end;
        }
        .view-detail-link {
            font-size: 0.7rem; color: #E67E22; display: flex; align-items: center; gap: 0.3rem;
            font-weight: 600;
        }
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: rgba(255,248,240,0.7);
            border-radius: 48px;
            color: #B45A2C;
        }

        /* 详情页面样式 */
        .weibo-detail-view {
            background: rgba(255,248,240,0.92); backdrop-filter: blur(20px);
            border-radius: 48px; padding: 1.2rem;
            margin: 0.5rem;
        }
        .weibo-detail-header {
            display: flex; align-items: center; gap: 1rem;
            border-bottom: 2px dashed #FFD5A4; padding-bottom: 0.7rem; margin-bottom: 1rem;

        .weibo-detail-back-btn {
            background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #E67E22;
        }
        .weibo-detail-title { font-size: 1.1rem; font-weight: 800; color: #3E2A1A; }
        .weibo-detail-info {
            background: rgba(255,245,235,0.9); border-radius: 28px; padding: 1rem 1.2rem;
            margin-bottom: 1.2rem; border-left: 4px solid #FF952D;
        }
        .weibo-detail-time { font-size: 0.85rem; color: #E67E22; font-weight: 700; margin-bottom: 0.5rem; }
        .weibo-detail-text { font-size: 0.9rem; line-height: 1.5; color: #5C3E28; margin-bottom: 0.6rem; white-space: pre-wrap; }
        .weibo-detail-link { display: inline-block; margin-top: 0.3rem; background: #FF952D; padding: 0.2rem 0.8rem; border-radius: 30px; font-size: 0.7rem; color: white; text-decoration: none; }
        .scroll-gallery {
            display: flex; overflow-x: auto; gap: 1rem; padding: 0.8rem 0.2rem;
            scroll-behavior: smooth;
        }
        .scroll-gallery::-webkit-scrollbar { height: 6px; background: #FFE0B2; border-radius: 10px; }
        .scroll-gallery::-webkit-scrollbar-thumb { background: #E67E22; border-radius: 10px; }
        .gallery-item {
            flex: 0 0 150px; background: white; border-radius: 24px; overflow: hidden;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1); transition: 0.2s; cursor: pointer;
        }
        .gallery-item:hover { transform: translateY(-5px); }
        .gallery-item img, .gallery-item video { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; }
        .item-caption { padding: 0.5rem 0.4rem; font-size: 0.65rem; text-align: center; color: #B45F2B; background: #FFFDF9; word-break: break-word; }

        /* 灯箱放大 */
        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
            cursor: pointer; visibility: hidden; opacity: 0; transition: 0.2s;
        }
        .lightbox.active { visibility: visible; opacity: 1; }
        .lightbox-img, .lightbox-video {
            max-width: 90vw; max-height: 90vh; border-radius: 32px; box-shadow: 0 0 40px #FFB86B;
        }
        .lightbox-video { background: #000; }

        /* 飘浮小泡泡 */
        .floating-bubble {
            position: fixed; border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, rgba(255,250,235,0.6), rgba(255,240,215,0.4), rgba(255,230,190,0.3));
            backdrop-filter: blur(3px);
            box-shadow: 0 5px 12px rgba(0,0,0,0.04), 0 0 0 1.5px rgba(255,255,240,0.8) inset;
            cursor: pointer; z-index: 20; pointer-events: auto;
            transition: transform 0.1s;
        }
        .floating-bubble:hover { transform: scale(1.05); }
        .particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        .tip-hint { position: fixed; bottom: 18px; left: 0; right: 0; text-align: center; font-size: 0.7rem; color: #B45A2C; background: rgba(255,245,230,0.8); backdrop-filter: blur(12px); width: fit-content; margin: 0 auto; padding: 5px 20px; border-radius: 60px; pointer-events: none; z-index: 45; font-weight: 600; }

        @media (max-width: 768px) {
            .main-layout {
                flex-direction: column;
            }
            .filter-sidebar {
                width: 100%;
                position: static;
                margin-bottom: 1rem;
            }
        }
        .corner-png {
            position: fixed; bottom: 20px; right: 20px; z-index: 50;
            width: 72px; height: 72px; border-radius: 50%; object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); cursor: pointer;
            transition: transform 0.3s; pointer-events: auto;
        }
        .corner-png:hover { transform: scale(1.12) rotate(8deg); }
    </style>

        { time: "2024-05-07", year: 2024, month: 5, text: "嗨 五一结束了 又要上学了 必须好好上(ง•̀_•́)ง然后我的鸭子在小区里不见了 找了一圈 结果在游泳池里 还换毛了✌️(＾▽＾)✌️ ​​​", link: "https://weibo.com/6574105934/OddwrnTE6", photos: ["weibo77.mp4","weibo78.jpg","weibo79.jpg","weibo80.jpg","weibo81.mp4","weibo82.jpg"].map(f => ({ img: WEIBO_BASE + f, text: f })) },
        { time: "2024-05-16", year: 2024, month: 5, text: "夏天来了[太阳][太阳]～阳光洒满大地～热情如火～照亮我们前进的路～", link: "https://weibo.com/6574105934/OeAlr1dYr", photos: ["weibo83.jpg","weibo84.jpg","weibo85.jpg"].map(f => ({ img: WEIBO_BASE + f, text: f })) }
    ];

    // 为2025、2026年添加一些模拟数据（展示筛选效果）
    const futureEntries = [
        { time: "2025-01-15", year: 2025, month: 1, text: "2025年的第一条微博！新的一年新的开始，希望大家都能梦想成真✨", link: "#", photos: [] },
        { time: "2025-03-20", year: 2025, month: 3, text: "春天来啦～樱花盛开的日子，和朋友们一起去野餐了🌸", link: "#", photos: [] },
        { time: "2025-06-10", year: 2025, month: 6, text: "夏天的风暖暖吹过～新歌录制中，敬请期待！🎵", link: "#", photos: [] },
        { time: "2026-02-08", year: 2026, month: 2, text: "2026年新年快乐！今年也要加油呀💪", link: "#", photos: [] },
        { time: "2026-05-22", year: 2026, month: 5, text: "演唱会倒计时！正在努力排练中🔥", link: "#", photos: [] }
    ];
    const allEntries = [...weiboEntries, ...futureEntries];

    let currentYear = 2024;
    let currentMonth = null; // null 表示显示该年份全部
    let audioCtx = null;
    let particles = [];
    let particleCtx = null;
    let animFrame = null;
    let activeFloatingBubbles = [];

    // 音效: 泡泡爆破
    function playPopSound() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 960; gain.gain.value = 0.28;
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.26);
            const noise = audioCtx.createScriptProcessor(512,1,1);
            noise.onaudioprocess = (e) => { for(let i=0;i<512;i++) e.outputBuffer.getChannelData(0)[i] = (Math.random()-0.5)*0.2; noise.disconnect(); };
            noise.connect(audioCtx.destination);
            setTimeout(()=> noise.disconnect(), 120);
        } catch(e) {}
    }

    // 粒子特效
    function initParticleCanvas() { const c=document.getElementById('particleCanvas'); particleCtx=c.getContext('2d'); const resize=()=>{ c.width=innerWidth; c.height=innerHeight; }; window.addEventListener('resize',resize); resize(); }
    function burstParticles(x,y){
        if(!particleCtx) initParticleCanvas();
        const canvas=document.getElementById('particleCanvas'); if(!canvas) return;
        for(let i=0;i<36;i++){
            const angle=Math.random()*Math.PI*2, speed=1.8+Math.random()*6;
            const vx=Math.cos(angle)*speed, vy=Math.sin(angle)*speed;
            const life=0.7+Math.random();
            const colors=['#FFB347','#FFAA66','#FFC48A','#FFE0B0','#FFB074'];
            particles.push({ x,y,vx,vy,life,maxLife:life,size:3+Math.random()*8,color:colors[Math.floor(Math.random()*colors.length)] });
        }
        if(animFrame) cancelAnimationFrame(animFrame);
        function animate(){
            if(!particleCtx) return;
            particleCtx.clearRect(0,0,canvas.width,canvas.height);
            let alive=false;
            for(let i=particles.length-1;i>=0;i--){
                const p=particles[i];
                p.x+=p.vx; p.y+=p.vy; p.life-=0.018;
                if(p.life<=0){ particles.splice(i,1); continue; }
                alive=true;
                particleCtx.globalAlpha=Math.min(0.8, (p.life/p.maxLife)*0.8);
                particleCtx.fillStyle=p.color;
                particleCtx.beginPath(); particleCtx.arc(p.x,p.y,p.size*(p.life/p.maxLife),0,Math.PI*2); particleCtx.fill();
            }
            if(alive) animFrame=requestAnimationFrame(animate);
            else { cancelAnimationFrame(animFrame); animFrame=null; particleCtx.clearRect(0,0,canvas.width,canvas.height); }
        }
        animFrame=requestAnimationFrame(animate);
    }

    // 飘浮泡泡
    class FloatingBubble { constructor(el,x,y,size,sy,sx){ this.element=el; this.x=x; this.y=y; this.size=size; this.speedY=sy; this.speedX=sx; this.active=true; }
    update(){ if(!this.active) return; this.y-=this.speedY; this.x+=this.speedX; if(this.y+this.size<0||this.y>innerHeight+200||this.x+this.size<-100||this.x-this.size>innerWidth+100){ this.remove(); return; } this.element.style.transform=`translate(${this.x}px, ${this.y}px)`; }
    remove(){ if(this.element&&this.element.parentNode) this.element.remove(); this.active=false; const idx=activeFloatingBubbles.indexOf(this); if(idx!==-1) activeFloatingBubbles.splice(idx,1); } }
    function createFloatingBubble(){
        const size=22+Math.random()*48; const startX=Math.random()*(innerWidth-size); const startY=innerHeight+15+Math.random()*40;
        const speedY=0.25+Math.random()*0.45; const speedX=(Math.random()-0.5)*0.3;
        const div=document.createElement('div'); div.className='floating-bubble'; div.style.width=`${size}px`; div.style.height=`${size}px`; div.style.left='0px'; div.style.top='0px'; div.style.position='fixed'; div.style.transform=`translate(${startX}px, ${startY}px)`;
        div.addEventListener('click',(e)=>{ e.stopPropagation(); const r=div.getBoundingClientRect(); burstParticles(r.left+r.width/2, r.top+r.height/2); playPopSound(); div.style.transition='transform 0.1s, opacity 0.12s'; div.style.transform=`translate(${r.left}px, ${r.top}px) scale(0.1)`; div.style.opacity='0'; setTimeout(()=>{ if(div.parentNode) div.remove(); const idx=activeFloatingBubbles.findIndex(b=>b.element===div); if(idx!==-1) activeFloatingBubbles.splice(idx,1); },130); });
        document.body.appendChild(div); const obj=new FloatingBubble(div,startX,startY,size,speedY,speedX); activeFloatingBubbles.push(obj); return obj;
    }
    function updateFloatingBubbles(){ for(let b of activeFloatingBubbles) b.update(); requestAnimationFrame(updateFloatingBubbles); }
    function startBubbleGenerator(){ setInterval(()=>{ if(activeFloatingBubbles.length<28) createFloatingBubble(); },2200); }

    // 灯箱
    function showMedia(src, type) {
        let lb = document.getElementById('customLightbox');
        if (!lb) {
            lb = document.createElement('div'); lb.id = 'customLightbox'; lb.className = 'lightbox';
            document.body.appendChild(lb);
            lb.addEventListener('click', () => { lb.classList.remove('active'); const v=lb.querySelector('video'); if(v) v.pause(); lb.innerHTML=''; });
        }
        lb.innerHTML = '';
        if (type === 'video') {
            const video = document.createElement('video'); video.src = src; video.controls = true; video.autoplay = true;
            video.className = 'lightbox-video'; video.style.maxWidth = '90vw'; video.style.maxHeight = '90vh';
            lb.appendChild(video); video.play().catch(e=>console.log);
        } else {
            const img = document.createElement('img'); img.src = src; img.className = 'lightbox-img';
            lb.appendChild(img);
        }
        lb.classList.add('active');
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

    // 获取筛选后的微博
    function getFilteredEntries() {
        return allEntries.filter(e => {
            if (e.year !== currentYear) return false;
            if (currentMonth !== null && e.month !== currentMonth) return false;
            return true;
        });
    }

    // 渲染微博详情页
    function renderDetail(entry) {
        const container = document.getElementById('weiboContainer');
        let photosHtml = '';
        if (entry.photos && entry.photos.length > 0) {
            photosHtml = `<div class="scroll-gallery">`;
            entry.photos.forEach(p => {
                const isVideo = p.img.toLowerCase().endsWith('.mp4');
                if (isVideo) {
                    photosHtml += `<div class="gallery-item" onclick="event.stopPropagation(); showMedia('${p.img}','video')"><video src="${p.img}" style="width:100%; aspect-ratio:1/1; object-fit:cover; pointer-events:none;"></video><div class="item-caption">🎬 视频</div></div>`;
                } else {
                    photosHtml += `<div class="gallery-item" onclick="event.stopPropagation(); showMedia('${p.img}','image')"><img src="${p.img}" onerror="this.src='https://picsum.photos/id/100/300/300'" loading="lazy"><div class="item-caption">📷 查看大图</div></div>`;
                }
            });
            photosHtml += `</div>`;
        } else {
            photosHtml = `<div style="text-align:center;padding:1rem;color:#B45A2C;">📷 暂无配图</div>`;
        }
        const html = `
            <div class="weibo-detail-view">
                <div class="weibo-detail-header">
                    <button class="weibo-detail-back-btn" id="detailBackBtn">←</button>
                    <div class="weibo-detail-title">📅 ${entry.time}</div>
                </div>
                <div class="weibo-detail-info">
                    <div class="weibo-detail-time">📅 ${entry.time}</div>
                    <div class="weibo-detail-text">${escapeHtml(entry.text).replace(/\n/g, '<br>')}</div>
                    ${entry.link && entry.link !== "#" ? `<a href="${entry.link}" target="_blank" class="weibo-detail-link">🔗 查看原文</a>` : ''}
                </div>
                ${photosHtml}
            </div>
        `;
        container.innerHTML = html;
        document.getElementById('detailBackBtn').onclick = () => { renderList(); };
    }

    // 渲染左侧筛选栏
    function renderFilterSidebar() {
        const sidebar = document.getElementById('filterSidebar');
        const years = [2024, 2025, 2026];
        let html = '';
        years.forEach(year => {
            const months = Array.from({length: 12}, (_, i) => i + 1);
            const yearEntries = allEntries.filter(e => e.year === year);
            const hasDataMonths = new Set(yearEntries.map(e => e.month));
            html += `
                <div class="filter-section">
                    <div class="filter-year-title" data-year="${year}">
                        <span>📅 ${year}年</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="month-list" data-year-list="${year}">
            `;
            months.forEach(month => {
                const hasData = hasDataMonths.has(month);
                const isActive = (currentYear === year && currentMonth === month);
                const activeClass = isActive ? 'active' : '';
                const disabledAttr = !hasData ? 'style="opacity:0.4;cursor:not-allowed;"' : '';
                html += `<span class="month-chip ${activeClass}" data-year="${year}" data-month="${month}" ${disabledAttr}>${month}月</span>`;
            });
            html += `</div></div>`;
        });
        html += `<div class="filter-reset"><button class="reset-btn" id="resetFilterBtn">🔄 显示全部</button></div>`;
        sidebar.innerHTML = html;
        
        // 绑定年份标题点击折叠
        document.querySelectorAll('.filter-year-title').forEach(title => {
            title.addEventListener('click', (e) => {
                e.stopPropagation();
                title.classList.toggle('collapsed');
                const monthList = title.nextElementSibling;
                if (monthList) monthList.classList.toggle('collapsed');
            });
        });
        // 绑定月份点击
        document.querySelectorAll('.month-chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                e.stopPropagation();
                const year = parseInt(chip.dataset.year);
                const month = parseInt(chip.dataset.month);
                const hasData = allEntries.some(e => e.year === year && e.month === month);
                if (!hasData) return;
                if (currentYear === year && currentMonth === month) {
                    // 如果点击已选中的月份，则清除月份筛选，显示该年份全部
                    currentMonth = null;
                } else {
                    currentYear = year;
                    currentMonth = month;
                }
                renderFilterSidebar();
                renderList();
            });
        });
        // 重置按钮
        const resetBtn = document.getElementById('resetFilterBtn');
        if (resetBtn) {
            resetBtn.onclick = () => {
                currentYear = 2024;
                currentMonth = null;
                renderFilterSidebar();
                renderList();
            };
        }
        // 高亮当前年份的折叠状态（默认全部展开，不做额外处理）
    }

    // 渲染微博卡片列表
    function renderList() {
        const container = document.getElementById('weiboContainer');
        const filtered = getFilteredEntries();
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state">✨ 暂无微博记录 ✨<br><small>试试其他年份或月份吧～</small></div>`;
            return;
        }
        let cardsHtml = `<div class="weibo-cards-list">`;
        filtered.sort((a,b) => b.time.localeCompare(a.time)).forEach(entry => {
            let thumbnailsHtml = `<div class="weibo-card-thumbnails">`;
            const previewPhotos = entry.photos ? entry.photos.slice(0, 5) : [];
            previewPhotos.forEach(photo => {
                const isVideo = photo.img.toLowerCase().endsWith('.mp4');
                if (isVideo) {
                    thumbnailsHtml += `<div class="thumb-item" onclick="event.stopPropagation(); showMedia('${photo.img}','video')"><video src="${photo.img}" style="width:100%;height:100%;object-fit:cover;"></video><div class="thumb-video-icon">🎬</div></div>`;
                } else {
                    thumbnailsHtml += `<div class="thumb-item" onclick="event.stopPropagation(); showMedia('${photo.img}','image')"><img src="${photo.img}" onerror="this.src='https://picsum.photos/id/100/80/80'" loading="lazy"></div>`;
                }
            });
            if (entry.photos && entry.photos.length > 5) thumbnailsHtml += `<div class="thumb-item" style="background:#FFE0B2; display:flex; align-items:center; justify-content:center;">+${entry.photos.length-5}</div>`;
            if (!entry.photos || entry.photos.length === 0) thumbnailsHtml += `<div style="font-size:0.7rem;color:#C27E4A;padding:0.2rem 0;">📷 暂无配图</div>`;
            thumbnailsHtml += `</div>`;
            let textSummary = entry.text.replace(/<br>/g, ' ').substring(0, 80);
            if (entry.text.length > 80) textSummary += '…';
            cardsHtml += `
                <div class="weibo-card" data-time="${entry.time}">
                    <div class="weibo-card-content">
                        <div class="weibo-card-time"><i class="far fa-calendar-alt"></i> ${entry.time}</div>
                        <div class="weibo-card-text">${escapeHtml(textSummary)}</div>
                        ${thumbnailsHtml}
                    </div>
                    <div class="weibo-card-footer">
                        <span class="view-detail-link">查看全文 <i class="fas fa-arrow-right"></i></span>
                    </div>
                </div>
            `;
        });
        cardsHtml += `</div>`;
        container.innerHTML = cardsHtml;
        // 绑定卡片点击
        document.querySelectorAll('.weibo-card').forEach(card => {
            const time = card.dataset.time;
            card.addEventListener('click', (e) => {
                if (e.target.closest('.thumb-item')) return;
                const entry = allEntries.find(e => e.time === time);
                if (entry) renderDetail(entry);
            });
        });
    }

    function init() {
        renderFilterSidebar();
        renderList();
        initParticleCanvas();
        startBubbleGenerator();
        updateFloatingBubbles();
        const actAudio = () => { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); document.removeEventListener('click', actAudio); };
        document.addEventListener('click', actAudio);
    }
    init();
</script>
